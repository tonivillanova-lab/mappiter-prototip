
<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Mappiter · Mapa (v26 web)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
:root{
  --blue1:#dce9f3;
  --blue2:#a8c1d7;
  --blue3:#7fa3c3;
  --border:#b8c0c6;
  --green:#3f6b3a;
}

html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}

body{
background:
radial-gradient(120% 90% at 50% 10%, rgba(255,255,255,.55) 0%, rgba(255,255,255,0) 55%),
linear-gradient(180deg,var(--blue1) 0%,var(--blue2) 52%,var(--blue3) 100%);
overflow:hidden;
}

#top{
position:fixed;
top:0;
left:0;
right:0;
height:58px;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 2px 8px rgba(0,0,0,.08);
z-index:1000;
}

#top img{
height:170px;
margin-top:18px;
}

#map{
position:fixed;
top:58px;
bottom:0;
left:0;
right:0;
}

.btn{
position:fixed;
right:16px;
width:48px;
height:48px;
border-radius:999px;
border:none;
background:#fff;
box-shadow:0 6px 16px rgba(0,0,0,.16);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

#star{top:72px}
#center{bottom:110px}

.bottom{
position:fixed;
bottom:22px;
left:12px;
right:12px;
display:flex;
justify-content:space-between;
}

.pill{
height:56px;
border-radius:999px;
border:none;
padding:0 22px;
font-weight:900;
font-size:17px;
box-shadow:0 6px 16px rgba(0,0,0,.16);
}

#territori{background:#fff}
#add{background:var(--green);color:#fff}

#loading{
position:fixed;
left:50%;
top:50%;
transform:translate(-50%,-50%);
background:#fff;
padding:14px 18px;
border-radius:16px;
font-weight:700;
box-shadow:0 10px 20px rgba(0,0,0,.15);
}

.leaflet-container{background:transparent}
.leaflet-control-attribution,.leaflet-control-zoom{display:none}
</style>
</head>

<body>

<div id="top">
<img src="logo_mappiter_verd_sensefons.png">
</div>

<div id="map"></div>

<div id="loading">Carregant mapa…</div>

<button id="star" class="btn">☆</button>
<button id="center" class="btn">⌖</button>

<div class="bottom">
<button id="territori" class="pill">Territori</button>
<button id="add" class="pill">+ Afegir</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const CAT_BOUNDS = L.latLngBounds([40.55,0.20],[42.90,3.30]);

const map = L.map('map',{
zoomControl:false,
attributionControl:false,
preferCanvas:true,
minZoom:6.6,
maxZoom:11
});

function initialView(){
map.fitBounds(CAT_BOUNDS,{padding:[0,0]});
map.panBy([0,-22],{animate:false});
startCenter = map.getCenter();
startZoom = map.getZoom();
}

let startCenter=null;
let startZoom=null;

document.getElementById("center").onclick=function(){
if(startCenter){
map.setView(startCenter,startZoom,{animate:false});
}
}

fetch("limits_municipals_web.geojson")
.then(r=>r.json())
.then(data=>{

L.geoJSON(data,{
style:{
color:"#b8c0c6",
weight:0.35,
opacity:0.9,
fillColor:"#ffffff",
fillOpacity:0.98
},
onEachFeature:(f,l)=>{
l.on("click",()=>{
map.fitBounds(l.getBounds(),{padding:[26,26]})
})
}
}).addTo(map)

initialView()

document.getElementById("loading").style.display="none"

})

</script>

</body>
</html>
