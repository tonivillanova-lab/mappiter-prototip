<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Mappiter</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#08262B">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
<style>
html,body{margin:0;height:100%;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#08262B;overflow:hidden}
#mapwrap{position:fixed;inset:0;background:radial-gradient(circle at 50% 43%, #1C6D76 0%, #15565F 25%, #0F3F46 45%, #0C3238 70%, #08262B 100%)}
#logoWrap{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:30;pointer-events:none}
#logoWrap img{height:42px;width:auto;display:block;filter:brightness(1.08) saturate(.2) contrast(1.02) drop-shadow(0 2px 8px rgba(0,0,0,.10))}
#map{position:absolute;inset:0;z-index:1}
button{position:fixed;right:16px;width:48px;height:48px;border-radius:50%;border:none;background:rgba(242,245,247,.96);color:#38515d;box-shadow:0 4px 10px rgba(0,0,0,.14);z-index:20}
#center{bottom:100px}
#status{position:fixed;left:12px;top:64px;background:rgba(8,38,43,.9);color:#F3F1EC;border:1px solid rgba(243,241,236,.14);border-radius:12px;padding:8px 10px;z-index:30;font-weight:700}
.maplibregl-ctrl-bottom-right,.maplibregl-ctrl-bottom-left,.maplibregl-ctrl-top-right,.maplibregl-ctrl-top-left{display:none!important}
</style>
</head>
<body>
<div id="logoWrap"><img src="logo_mappiter_verd_sensefons.png" alt="Mappiter"></div>
<div id="mapwrap"><div id="map"></div></div>
<div id="status">Carregant mapa…</div>
<button id="center" aria-label="Centrar Catalunya">⌖</button>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
function bounds(fc){
let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
function scan(c){
if(typeof c[0]==="number"){
minX=Math.min(minX,c[0]);minY=Math.min(minY,c[1]);maxX=Math.max(maxX,c[0]);maxY=Math.max(maxY,c[1]);
}else{c.forEach(scan)}
}
fc.features.forEach(f=>scan(f.geometry.coordinates));
return [[minX,minY],[maxX,maxY]];
}
function expandBounds(b,f){
const minX=b[0][0],minY=b[0][1],maxX=b[1][0],maxY=b[1][1];
const dx=(maxX-minX)*f,dy=(maxY-minY)*f;
return [[minX-dx,minY-dy],[maxX+dx,maxY+dy]];
}
function clamp(n,min,max){return Math.min(max,Math.max(min,n));}
function demoState(i,total){
const multiple=Math.floor(total*0.10);
const lived=Math.floor(total*0.25);
const marked=Math.floor(total*0.50);
if(i<multiple)return"lived_multiple";
if(i<lived)return"lived";
if(i<marked)return"marked";
return"default";
}
document.addEventListener("DOMContentLoaded",init);
async function init(){
const status=document.getElementById("status");
const municipis=await fetch("municipis_icgc_simplificat.json").then(r=>r.json());
const total=municipis.features.length;
municipis.features=municipis.features.map((f,i)=>{
if(!f.properties)f.properties={};
f.properties.demo_state=demoState(i,total);
f.id=i+1;
return f;
});
const catBounds=bounds(municipis);
const expandedBounds=expandBounds(catBounds,0.0015);
const map=new maplibregl.Map({
container:"map",
style:{version:8,sources:{},layers:[]},
attributionControl:false,
renderWorldCopies:false,
dragRotate:false,
pitchWithRotate:false,
touchPitch:false
});
map.dragRotate.disable();
map.touchZoomRotate.disableRotation();
let initialCamera=null;
let suppress=false;
function centerMap(){
if(!initialCamera)return;
suppress=true;
map.jumpTo(initialCamera);
setTimeout(()=>suppress=false,0);
}
map.on("load",()=>{
map.addSource("municipis",{type:"geojson",data:municipis});
map.addLayer({
id:"municipis-fill",
type:"fill",
source:"municipis",
paint:{
"fill-color":["match",["get","demo_state"],"marked","#2EC4CE","lived","#0B4F8A","lived_multiple","#062E57","#F3F1EC"]
}
});
map.addLayer({
id:"municipis-line",
type:"line",
source:"municipis",
paint:{
"line-color":["match",["get","demo_state"],"marked","#6FAEB4","lived","#CFE6FF","lived_multiple","#E6F1FF","#BEB8B0"],
"line-width":["interpolate",["linear"],["zoom"],6,0.32,8,0.58,10,0.90]
}
});
map.resize();
initialCamera=map.cameraForBounds(catBounds,{padding:{top:28,right:18,bottom:64,left:18}});
initialCamera.bearing=0;
initialCamera.pitch=0;
map.jumpTo(initialCamera);
map.setMinZoom(6.1);
map.setMaxZoom(10.5);
status.style.display="none";
});
map.on("moveend",()=>{
if(suppress || !initialCamera)return;
const c=map.getCenter();
const minLng=expandedBounds[0][0];
const minLat=expandedBounds[0][1];
const maxLng=expandedBounds[1][0];
const maxLat=expandedBounds[1][1];
const lng=clamp(c.lng,minLng,maxLng);
const lat=clamp(c.lat,minLat,maxLat);
if(lng!==c.lng || lat!==c.lat){
suppress=true;
map.easeTo({center:[lng,lat],zoom:map.getZoom(),duration:200});
setTimeout(()=>suppress=false,220);
}
});
document.getElementById("center").addEventListener("click",centerMap);
}
</script>
</body>
</html>
