<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Mappiter trigger primer render</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
<style>
:root{ --header-h:60px; }
html,body{
  margin:0;
  height:100%;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:#fff;
}
body{
  display:flex;
  flex-direction:column;
  min-height:100dvh;
  overflow:hidden;
}
#topBand{
  height:var(--header-h);
  flex:0 0 var(--header-h);
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  border-bottom:1px solid rgba(0,0,0,.08);
}
#topBand img{
  height:55px;
  max-width:90vw;
  object-fit:contain;
}
#mapWrap{
  position:relative;
  flex:1 1 auto;
  min-height:0;
  background:#efefef;
}
#map{
  position:absolute;
  inset:0;
}
#placeholder{
  position:absolute;
  inset:0;
  background:#efefef;
  z-index:1;
}
#debug{
  position:fixed;
  left:10px;
  right:10px;
  bottom:10px;
  max-height:40vh;
  overflow:auto;
  background:#ffffffee;
  border:1px solid #ccc;
  border-radius:10px;
  padding:8px;
  font:12px monospace;
  white-space:pre-wrap;
  z-index:20;
}
</style>
</head>
<body>

<div id="topBand"><img src="logo_mappiter_verd_sensefons.png" alt="Mappiter"></div>
<div id="mapWrap">
  <div id="placeholder"></div>
  <div id="map"></div>
</div>
<div id="debug"></div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
const T0 = performance.now();
function log(t){
  const s = "[" + (performance.now()-T0).toFixed(1) + " ms] " + t;
  console.log(s);
  document.getElementById("debug").textContent += s + "\\n";
}

function bounds(fc){
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  function scan(c){
    if(typeof c[0]==="number"){
      minX=Math.min(minX,c[0]); minY=Math.min(minY,c[1]);
      maxX=Math.max(maxX,c[0]); maxY=Math.max(maxY,c[1]);
    }else c.forEach(scan);
  }
  fc.features.forEach(f=>scan(f.geometry.coordinates));
  return [[minX,minY],[maxX,maxY]];
}

async function init(){
  log("DOMContentLoaded / init");
  const mapWrap = document.getElementById("mapWrap");
  const placeholder = document.getElementById("placeholder");

  log("fetch municipis");
  const municipis = await fetch("municipis_icgc_simplificat.json",{cache:"default"}).then(r=>r.json());
  log("municipis carregats");
  const catBounds = bounds(municipis);

  // OPCIÓ A
  log("OPCIÓ A: forçar reflow abans de createMap");
  const h1 = document.body.offsetHeight;
  const r1 = mapWrap.getBoundingClientRect();
  log("body.offsetHeight=" + h1);
  log("mapWrap rect=" + Math.round(r1.width) + "x" + Math.round(r1.height));

  log("createMap");
  const map = new maplibregl.Map({
    container:"map",
    style:{version:8,sources:{},layers:[]},
    attributionControl:false,
    renderWorldCopies:false,
    dragRotate:false,
    pitchWithRotate:false,
    touchPitch:false,
    doubleClickZoom:false
  });

  function fitInitial(){
    log("fitInitial");
    map.fitBounds(catBounds,{padding:36,animate:false});
  }

  map.on("load",()=>{
    log("map.load");

    map.addSource("municipis",{type:"geojson",data:municipis});
    log("addSource");

    map.addLayer({
      id:"fill",
      type:"fill",
      source:"municipis",
      paint:{"fill-color":"#f4f4f2"}
    });
    log("addLayer fill");

    map.addLayer({
      id:"line",
      type:"line",
      source:"municipis",
      paint:{
        "line-color":"#B8B8B8",
        "line-width":["interpolate",["linear"],["zoom"],6,0.5,8,0.8,10,1.2]
      }
    });
    log("addLayer line");

    fitInitial();
  });

  map.on("render",()=>{
    if(!window.__firstRender){
      window.__firstRender = true;
      log("primer render visible");
      placeholder.style.display = "none";
    }
  });
}

document.addEventListener("DOMContentLoaded", init);
</script>

</body>
</html>
