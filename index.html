<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#7FA3C3"/>
<title>Mappiter · Mapa (v14)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root{
    --appBg:#6E94B8;
    --appBgMid:#7FA3C3;
    --appBgLight:#A9C0D6;
    --paper:#FFFFFF;
    --ink:#14171a;

    --muniStroke:#7A7A7A;
    --comarcaStroke:#4F4F4F;
    --unmarked:var(--paper);
    --marked:#8FB58A;
    --memoryStrong:#3F6B3A;
    --goals:#B88A2E;
    --inactiveGoals:#ECEEEC;

    --card:rgba(255,255,255,.94);
    --shadow:0 12px 28px rgba(0,0,0,.14);
    --shadowSoft:0 10px 22px rgba(0,0,0,.10);
    --r999:999px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial;
    background:radial-gradient(120% 90% at 50% 18%, rgba(255,255,255,.55) 0%, rgba(255,255,255,0) 58%),linear-gradient(180deg, var(--appBgLight) 0%, var(--appBgMid) 44%, var(--appBg) 100%),repeating-radial-gradient(circle at 20% 30%, rgba(255,255,255,.05) 0 2px, rgba(255,255,255,0) 2px 10px);
    color:var(--ink);
    overflow:hidden;
  }


  /* Capçalera blanca amb logo centrat */
  .topBand{
  display:flex;
  align-items:center;
  justify-content:center;
    position:fixed;
    left:0; right:0; top:0;
    height:58px;
    z-index:700;
    background:rgba(255,255,255,.92);
    backdrop-filter: blur(10px);
    border-bottom:1px solid rgba(20,23,26,.08);
    box-shadow:0 8px 18px rgba(0,0,0,.10);
    display:flex;
    align-items:center;
    justify-content:center;
    padding-top: env(safe-area-inset-top, 0px);
  }
  .brandBand{
    display:flex; align-items:center; justify-content:center;
    width: min(92vw, 720px);
  }
  .brandLogoBand{
  margin-top:16px;
    height:188px;
    width:auto;
    display:block;
    image-rendering:auto;
  }

  .topFade{position:fixed;left:0;right:0;top:104px;height:18px;z-index:690;pointer-events:none;background:linear-gradient(180deg, rgba(255,255,255,.55) 0%, rgba(255,255,255,0) 100%);}

  /* Estrella flotant sota la capçalera */
  .floatingStar{
    position:fixed;
    right:16px;
    top:80px;
    z-index:710;
  }

  #map{position:fixed; inset:0; background:transparent;}

  .topBar{display:none}
  .brand{
    pointer-events:auto;
    display:flex; align-items:center; justify-content:center;
    gap:0;
    padding:0;
    border-radius:0;
    background:transparent;
    border:0;
    backdrop-filter:none;
    box-shadow:none;
    margin:0 auto;
  }
  .brand img{height:120px; width:auto; display:block; filter: drop-shadow(0 10px 18px rgba(0,0,0,.18));}
  .brand .word{display:none;}
  .brand .word{display:none;}
  .brand .word{font-weight:950; font-size:20px; letter-spacing:.2px; color:var(--memoryStrong);}
  .topRight{margin-left:auto; pointer-events:auto; display:flex; gap:10px; align-items:center}

  .iconBtn{
    width:46px; height:46px;
    border-radius:var(--r999);
    border:1px solid rgba(20,23,26,.14);
    background:rgba(255,255,255,.92);
    display:flex; align-items:center; justify-content:center;
    box-shadow:var(--shadowSoft);
  }
  .iconBtn:active{transform:scale(.98)}
  .iconBtn svg{width:18px;height:18px;stroke:#111;stroke-width:2;fill:none;opacity:.82}
  .iconBtn.active{background:var(--goals); border-color:transparent;}
  .iconBtn.active svg{stroke:#fff; fill:#fff; opacity:1;}

  .dock{
    position:fixed;
    left:12px; right:12px; bottom:12px;
    z-index:650;
    display:flex; gap:10px; align-items:center;
    pointer-events:none;
  }
  .dock > *{pointer-events:auto}
  .pill{
    height:56px;
    border-radius:var(--r999);
    border:1px solid rgba(20,23,26,.14);
    background:rgba(255,255,255,.92);
    box-shadow:var(--shadowSoft);
    display:flex; align-items:center; justify-content:center;
    padding:0 16px;
    font-weight:950;
    color:rgba(20,23,26,.86);
  }
  .pill:active{transform:scale(.99)}
  .pill.primary{
    background:var(--memoryStrong);
    color:#fff;
    border:0;
    box-shadow:var(--shadow);
    padding:0 18px;
    margin-left:auto;
  }

  .centerBtn{
    position:fixed;
    right:18px;
    bottom:84px;
    z-index:640;
    width:46px; height:46px;
    border-radius:var(--r999);
    border:1px solid rgba(20,23,26,.14);
    background:rgba(255,255,255,.94);
    box-shadow:var(--shadowSoft);
    display:flex; align-items:center; justify-content:center;
  }
  .centerBtn svg{width:18px;height:18px;stroke:#111;stroke-width:2;fill:none;opacity:.82}
  .centerBtn:active{transform:scale(.98)}

  .muniCard{
    position:fixed;
    left:12px; right:12px; bottom:86px;
    z-index:740;
    background:var(--card);
    border:1px solid rgba(20,23,26,.12);
    border-radius:22px;
    box-shadow:var(--shadowSoft);
    padding:12px;
    display:none;
    backdrop-filter: blur(12px);
  }
  .muniCard.show{display:block}
  .muniTop{display:flex; align-items:flex-start; justify-content:space-between; gap:12px}
  .muniName{font-size:16px; font-weight:950; line-height:1.15}
  .muniMeta{margin-top:4px; font-size:12.5px; color:rgba(20,23,26,.62)}
  .xBtn{
    width:40px;height:40px;border-radius:14px;
    border:1px solid rgba(20,23,26,.14);
    background:#fff;
    display:flex; align-items:center; justify-content:center;
  }
  .xBtn svg{width:16px;height:16px;stroke:#111;stroke-width:2;fill:none;opacity:.75}
  .muniActions{margin-top:10px; display:flex; gap:10px; flex-wrap:wrap}
  .btn{
    flex:1;
    min-width:140px;
    border:1px solid rgba(20,23,26,.14);
    border-radius:16px;
    padding:11px 12px;
    font-size:14px;
    font-weight:950;
    background:#fff;
    color:rgba(20,23,26,.86);
    text-align:center;
  }
  .btn.primary{background:rgba(63,107,58,.10); border-color:rgba(63,107,58,.45)}
  .btn:active{transform:scale(.99)}
  .btnRow{display:flex; gap:10px; width:100%}

  .backdrop{position:fixed; inset:0; background:rgba(0,0,0,.26); display:none; z-index:800}
  .sheet{
    position:fixed; left:0; right:0; bottom:0;
    height:88%;
    background:#fff;
    border-radius:24px 24px 0 0;
    box-shadow:var(--shadow);
    transform:translateY(100%);
    transition:transform .22s ease;
    z-index:810;
    display:flex; flex-direction:column;
  }
  .sheet.open{transform:translateY(0)}
  .backdrop.open{display:block}
  .grab{width:44px;height:5px;border-radius:var(--r999);background:rgba(20,23,26,.16);margin:10px auto 8px auto}
  .sheetHead{
    display:flex; align-items:center; justify-content:space-between;
    padding:0 14px 10px 14px;
    border-bottom:1px solid rgba(20,23,26,.06);
  }
  .sheetHead h2{margin:0; font-size:15px; letter-spacing:.2px}
  .headBtns{display:flex; gap:10px; align-items:center;}
  .ghostBtn{border:0;background:transparent;color:rgba(20,23,26,.70);font-size:14px;padding:8px 10px;font-weight:950}
  .ghostBtn.on{color:var(--memoryStrong);}

  .search{
    margin:10px 14px 0 14px;
    display:flex; align-items:center; gap:8px;
    border:1px solid rgba(20,23,26,.12);
    border-radius:14px;
    padding:10px 12px;
    background:#fff;
  }
  .search svg{width:16px;height:16px;stroke:#111;stroke-width:2;fill:none;opacity:.55}
  .search input{border:0; outline:0; font-size:15px; width:100%}

  .filters{display:flex; gap:8px; margin:10px 14px 0 14px; flex-wrap:wrap}
  .chip{
    border:1px solid rgba(20,23,26,.12);
    border-radius:var(--r999);
    padding:8px 10px;
    font-size:13px;
    background:#fff;
    color:rgba(20,23,26,.80);
    font-weight:950;
  }
  .chip.on{border-color:rgba(63,107,58,.45); background:rgba(63,107,58,.08)}

  .list{
    margin-top:6px;
    overflow:auto;
    -webkit-overflow-scrolling: touch;
    flex:1;
    padding:0 14px 64px 14px;
  }
  .row{
    padding:10px 0;
    border-bottom:1px solid rgba(20,23,26,.08);
    display:flex; gap:10px; align-items:center;
  }
  .row:last-child{border-bottom:0}
  .selDot{
    width:18px; height:18px; border-radius:999px;
    border:2px solid rgba(20,23,26,.28);
    flex:0 0 auto;
  }
  .selDot.filled{background:var(--memoryStrong); border-color:var(--memoryStrong);}
  .rowMain{flex:1; min-width:0}
  .rowTitle{
    font-weight:950; font-size:15px; line-height:1.2;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .rowTitle.marked{color:var(--memoryStrong)}
  .rowGo{
    flex:0 0 auto;
    font-weight:950;
    color:rgba(20,23,26,.55);
    font-size:18px;
    line-height:1;
    padding:6px 8px;
    border-radius:10px;
    border:1px solid rgba(20,23,26,.10);
    background:rgba(255,255,255,.9);
  }
  .rowMeta{
    margin-top:2px;
    font-size:12.5px;
    color:rgba(20,23,26,.62);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .counts{
    display:flex; gap:10px; align-items:center;
    font-size:12.5px;
    color:rgba(20,23,26,.74);
    font-weight:950;
    white-space:nowrap;
  }
  .counts span{display:inline-flex; align-items:center; gap:6px}
  .counts svg{width:14px;height:14px;stroke:#111;stroke-width:2;fill:none;opacity:.62}

  .actionBar{
    position:fixed; left:12px; right:12px; bottom:12px;
    z-index:820;
    display:none;
    gap:10px;
  }
  .actionBar.show{display:flex;}
  .actionBar button{
    flex:1;
    height:56px;
    border-radius:var(--r999);
    border:1px solid rgba(20,23,26,.14);
    background:rgba(255,255,255,.96);
    box-shadow:var(--shadowSoft);
    font-weight:950;
  }
  .actionBar .mark{background:rgba(63,107,58,.10); border-color:rgba(63,107,58,.45);}
  .actionBar .unmark{background:rgba(20,23,26,.06);}

  .toTop{
    position:fixed;
    right:18px;
    bottom:92px;
    z-index:820;
    width:40px; height:40px;
    border-radius:var(--r999);
    border:1px solid rgba(20,23,26,.14);
    background:rgba(255,255,255,.94);
    box-shadow:var(--shadowSoft);
    display:none;
    align-items:center; justify-content:center;
    font-weight:950;
  }
  .toTop.show{display:flex;}

  .leaflet-control-container{display:none}

  /* Efecte elevat del mapa (visible en canvas al mòbil) */
  .leaflet-overlay-pane{
    filter: drop-shadow(0 20px 34px rgba(0,0,0,.18));
  }
  .leaflet-overlay-pane::before{
    content:"";
    position:absolute;
    inset:10% 7% 12% 7%;
    pointer-events:none;
    background:radial-gradient(78% 60% at 50% 44%, rgba(255,255,255,.16) 0%, rgba(255,255,255,0) 66%);
  }
  .leaflet-overlay-pane canvas{
    filter: drop-shadow(0 0 0 rgba(0,0,0,0));
  }


  /* Mapa flotant (sense requadre): ombra global del conjunt del mapa */
  
  /* Lleu "paper" sota el mapa perquè el blau no entri dins els municipis */
  .leaflet-overlay-pane svg::before{content:"";}
  /* Haze suau al voltant del mapa (no és un requadre, és llum difusa) */
  

  .leaflet-interactive{
    transition:fill 220ms ease, fill-opacity 220ms ease;
    filter:none;
  }
  .pulseFill{animation:pulseFill .26s ease-out}
  @keyframes pulseFill{0%{filter:brightness(1.0)}45%{filter:brightness(1.14)}100%{filter:brightness(1.0)}}

  .loader{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    z-index:900;
    background:rgba(246,247,245,.92);
    backdrop-filter: blur(10px);
    padding:20px;
  }
  .loaderCard{
    width:min(560px, 92vw);
    background:#fff;
    border:1px solid rgba(20,23,26,.12);
    border-radius:22px;
    box-shadow:var(--shadow);
    padding:16px 16px 14px 16px;
  }
  .loaderCard h1{margin:0; font-size:18px}
  .loaderCard p{margin:10px 0 0 0; color:rgba(20,23,26,.70); font-size:14.5px; line-height:1.35}
  .fileRow{margin-top:12px; display:grid; gap:10px}
  .filePick{
    border:1px dashed rgba(20,23,26,.22);
    border-radius:16px;
    padding:12px;
    background:rgba(20,23,26,.02);
  }
  .filePick label{display:block; font-weight:950; font-size:13.5px}
  .filePick input{margin-top:8px; width:100%}
  .loaderActions{margin-top:12px; display:flex; gap:10px; flex-wrap:wrap}
  .loaderActions button{
    border:0; border-radius:16px;
    padding:12px 14px;
    font-weight:950;
    background:var(--memoryStrong);
    color:#fff;
    flex:1;
    min-width:160px;
  }
  .loaderActions .ghost{background:rgba(20,23,26,.06); color:rgba(20,23,26,.86)}
  .small{font-size:12.5px;color:rgba(20,23,26,.62);margin-top:10px}
</style>
</head>

</div>

    <svg viewBox="0 0 24 24"><path d="M21 21l-4.2-4.2"/><path d="M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15z"/></svg>
    <input id="q" placeholder="Cercar municipi" type="search" inputmode="search" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" enterkeyhint="search"/>
  </div>

  <div class="filters" aria-label="Filtres">
    <button id="fAll" class="chip on">Tots</button>
    <button id="fMarked" class="chip">Marcats</button>
    <button id="fWithExp" class="chip">Amb vivències</button>
    <button id="fWithGoals" class="chip">Amb fites</button>
    <button id="fWithRoutes" class="chip">Amb rutes</button>
  </div>

  <div id="list" class="list" aria-label="Llista de municipis"></div>
</div>

<div id="actionBar" class="actionBar" aria-label="Accions selecció múltiple">
  <button id="btnMarkSel" class="mark">Marcar seleccionats</button>
  <button id="btnUnmarkSel" class="unmark">Treure marca</button>
</div>

<button id="toTop" class="toTop" title="Tornar a dalt" aria-label="Tornar a dalt">↑</button>

<div id="loader" class="loader" style="display:none">
  <div class="loaderCard">
    <h1>Carrega els fitxers del mapa</h1>
    <p>Només cal fer-ho una vegada. Després quedarà guardat al dispositiu.</p>

    <div class="fileRow">
      <div class="filePick">
        <label>municipis.json</label>
        <input id="fileMunis" type="file" accept=".json,application/json"/>
      </div>
      <div class="filePick">
        <label>limits_municipals.geojson</label>
        <input id="fileLimits" type="file" accept=".json,.geojson,application/geo+json,application/json"/>
      </div>
      <div class="filePick" style="opacity:.88">
        <label>limits_comarcals.geojson (opcional)</label>
        <input id="fileComarques" type="file" accept=".json,.geojson,application/geo+json,application/json"/>
      </div>
    </div>

    <div class="loaderActions">
      <button id="btnLoad">Carregar</button>
      <button id="btnReset" class="ghost">Reiniciar dades</button>
    </div>
    <div class="small">Si ja havies carregat fitxers abans, normalment no et sortirà aquest pas.</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const IDB_DB = "mappiter-cat-db";
const IDB_STORE = "kv";
const IDB_KEYS = { munis:"munis_local_v5", limits_muni:"limits_muni_local_v5", limits_com:"limits_com_local_v5" };
const LS_KEY = "mappiter-cat-state-v5";

const CAT_BOUNDS = L.latLngBounds([40.55, 0.20], [42.90, 3.30]);

function $(id){ return document.getElementById(id); }
function safeJsonParse(raw, fallback){ try{ return JSON.parse(raw); }catch{ return fallback; } }
function normalizeText(s){ return (s||"").toString().toLowerCase().normalize("NFD").replace(/[\\u0300-\\u036f]/g,"").replace(/\\s+/g," ").trim(); }

function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_DB, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbGet(key){
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, "readonly");
    const st = tx.objectStore(IDB_STORE);
    const req = st.get(key);
    req.onsuccess = () => resolve(req.result ?? null);
    req.onerror = () => reject(req.error);
  });
}
async function idbSet(key, value){
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, "readwrite");
    const st = tx.objectStore(IDB_STORE);
    const req = st.put(value, key);
    req.onsuccess = () => resolve(true);
    req.onerror = () => reject(req.error);
  });
}
async function idbClear(){
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, "readwrite");
    const st = tx.objectStore(IDB_STORE);
    const req = st.clear();
    req.onsuccess = () => resolve(true);
    req.onerror = () => reject(req.error);
  });
}
async function readFileAsJson(file){
  const text = await file.text();
  return JSON.parse(text);
}

/* User state */
let userState = {};
function loadUserState(){ userState = safeJsonParse(localStorage.getItem(LS_KEY), {}) || {}; }
function saveUserState(){ localStorage.setItem(LS_KEY, JSON.stringify(userState)); }
function ensureMuniState(id){
  if (!userState[id]) userState[id] = { marked:false, experiences:[], goals:[], routes:[], people:[] };
  const st = userState[id];
  if (!Array.isArray(st.experiences)) st.experiences = [];
  if (!Array.isArray(st.goals)) st.goals = [];
  if (!Array.isArray(st.routes)) st.routes = [];
  if (!Array.isArray(st.people)) st.people = [];
  if (typeof st.marked !== "boolean") st.marked = !!st.marked;
  return st;
}

/* Data */
let map = null;
let MUNICIPIS = [];
let MUNICIPIS_BY_CODI = new Map();
let LIMITS_MUNI_GJ = null;
let LIMITS_COM_GJ = null;

const layerById = new Map();
let selectedId = null;
let mode = "memory";
let isSelectMode = false;
const selectedSet = new Set();

function buildByCodi(){
  MUNICIPIS_BY_CODI.clear();
  for (const m of MUNICIPIS) MUNICIPIS_BY_CODI.set(String(m.codi).trim(), m);
}
function featureCodi(feature){
  const p = feature?.properties || {};
  const keys = ["codi","codi_ine","codiine","ine","codine","codi_muni","codi_municipi","CODI_INE","CODIINE"];
  for (const k of keys) if (p[k]!=null && String(p[k]).trim()!=="") return String(p[k]).trim();
  return null;
}
function cssVar(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

function fillFor(id){
  const st = ensureMuniState(id);
  if (mode === "goals") return st.goals.length ? cssVar("--goals") : cssVar("--inactiveGoals");
  if (st.experiences.length) return cssVar("--memoryStrong");
  if (st.marked) return cssVar("--marked");
  return cssVar("--unmarked");
}
function styleFor(id){
  return {
    color: cssVar("--muniStroke"),
    weight: 0.22,
    opacity: 1,
    lineJoin: "round",
    lineCap: "round",
    fillColor: fillFor(id),
    fillOpacity: 1
  };
}
function applyStyle(id, withPulse=false){
  const layer = layerById.get(id);
  if (!layer) return;
  layer.setStyle(styleFor(id));
  const el = layer.getElement?.();
  if (withPulse && el){
    el.classList.remove("pulseFill");
    void el.getBoundingClientRect();
    el.classList.add("pulseFill");
    setTimeout(()=> el.classList.remove("pulseFill"), 280);
  }
}
function refreshAllStyles(){
  for (const [id] of layerById) applyStyle(id, false);
}

function setupMap(){

  const renderer = L.canvas({ padding: 0.2 });

  map = L.map("map", {
    zoomControl:false,
    attributionControl:false,
    zoomSnap: 0.5,
    minZoom: 6.6,
    maxZoom: 11,
    maxBounds: CAT_BOUNDS.pad(0.18),
    maxBoundsViscosity: 0.85,
    renderer,
    zoomAnimation:false,
    fadeAnimation:false
  });

  map.fitBounds(CAT_BOUNDS, { padding:[0,0] });
  setTimeout(()=>{ try{ map.zoomIn(0.25); }catch(e){} }, 0);

  // Límits comarcals (si existeixen): contorn més gruixut
  if (LIMITS_COM_GJ){
    L.geoJSON(LIMITS_COM_GJ, {
      smoothFactor: 0,
      style: () => ({
        color: "#3F3F3F",
        weight: 0.82,
        opacity: 0.96,
        fillOpacity: 0,
        lineJoin: "round",
        lineCap: "round"
      })
    }).addTo(map);
  }

  L.geoJSON(LIMITS_MUNI_GJ, {
    smoothFactor: 0,
    style: (feature) => {
      const id = featureCodi(feature);
      return styleFor(id);
    },
    onEachFeature: (feature, layer) => {
      const id = featureCodi(feature);
      if (!id) return;
      layerById.set(id, layer);
      layer.on("click", () => onMuniTap(id));
    }
  }).addTo(map);

  requestAnimationFrame(() => map.invalidateSize());

  setTimeout(()=> map.invalidateSize(), 80);
}

function showMuniCard(id){
  selectedId = id;
  const m = MUNICIPIS_BY_CODI.get(String(id).trim());
  const st = ensureMuniState(id);
  $("muniName").textContent = m?.nom || `Municipi ${id}`;
  $("muniMeta").textContent = `${m?.comarca || "—"} · ${m?.provincia || "—"}`;
  $("btnToggleMark").textContent = st.marked ? "Treure marca" : "Marcar";
  $("muniCard").classList.add("show");
}
function hideMuniCard(){ $("muniCard").classList.remove("show"); selectedId = null; }

function onMuniTap(id){
  const layer = layerById.get(String(id).trim());
  if (layer){
    try{ map.fitBounds(layer.getBounds(), { padding:[28,28] }); }catch{}
  }
  showMuniCard(String(id).trim());
}

$("muniClose").addEventListener("click", hideMuniCard);

$("btnToggleMark").addEventListener("click", () => {
  if (!selectedId) return;
  const st = ensureMuniState(selectedId);
  st.marked = !st.marked;
  saveUserState();
  $("btnToggleMark").textContent = st.marked ? "Treure marca" : "Marcar";
  applyStyle(selectedId, true);
  refreshTerritoriList();
});

$("btnAddExperience").addEventListener("click", () => {
  if (!selectedId) return;
  const st = ensureMuniState(selectedId);
  st.experiences.push({ at: Date.now(), title:"(prova)" });
  saveUserState();
  applyStyle(selectedId, true);
  refreshTerritoriList();
});

$("btnAddGoal").addEventListener("click", () => {
  if (!selectedId) return;
  const st = ensureMuniState(selectedId);
  st.goals.push({ at: Date.now(), title:"(prova)" });
  saveUserState();
  if (mode === "goals") applyStyle(selectedId, true);
  refreshTerritoriList();
});

$("btnDetail").addEventListener("click", () => {
  if (!selectedId) return;
  alert("Detall municipi (pendent).");
});

function setMode(next){
  mode = next;
  $("btnModeGoals").classList.toggle("active", mode === "goals");
  $("btnAdd").textContent = (mode === "goals") ? "+ Afegir fita" : "+ Afegir";
  refreshAllStyles();
}
$("btnModeGoals").addEventListener("click", () => {
  setMode(mode === "goals" ? "memory" : "goals");
});

$("btnCenter").addEventListener("click", () => {
  map.fitBounds(CAT_BOUNDS, { padding:[0,0] });
  hideMuniCard();
});

$("btnAdd").addEventListener("click", () => {
  alert(mode === "goals" ? "Afegir fita (pendent)" : "Afegir (pendent)");
});

function openSheet(){
  $("backdrop").classList.add("open");
  $("sheet").classList.add("open");
  hideMuniCard();
  setTimeout(()=> $("q").focus(), 80);
}
function closeSheet(){
  $("backdrop").classList.remove("open");
  $("sheet").classList.remove("open");
  exitSelectMode();
}
$("btnTerritori").addEventListener("click", openSheet);
$("sheetClose").addEventListener("click", closeSheet);
$("backdrop").addEventListener("click", closeSheet);

let dragStartY = null;
$("sheet").addEventListener("touchstart", (e)=>{
  if (!e.touches?.length) return;
  dragStartY = e.touches[0].clientY;
}, {passive:true});
$("sheet").addEventListener("touchmove", (e)=>{
  if (dragStartY==null || !e.touches?.length) return;
  const dy = e.touches[0].clientY - dragStartY;
  if (dy > 90) closeSheet();
}, {passive:true});
$("sheet").addEventListener("touchend", ()=>{ dragStartY = null; }, {passive:true});

let filter = "all";
function setFilter(next){
  filter = next;
  $("fAll").classList.toggle("on", filter==="all");
  $("fMarked").classList.toggle("on", filter==="marked");
  $("fWithExp").classList.toggle("on", filter==="exp");
  $("fWithGoals").classList.toggle("on", filter==="goals");
  $("fWithRoutes").classList.toggle("on", filter==="routes");
  refreshTerritoriList();
}
$("fAll").addEventListener("click", ()=>setFilter("all"));
$("fMarked").addEventListener("click", ()=>setFilter("marked"));
$("fWithExp").addEventListener("click", ()=>setFilter("exp"));
$("fWithGoals").addEventListener("click", ()=>setFilter("goals"));
$("fWithRoutes").addEventListener("click", ()=>setFilter("routes"));
$("q").addEventListener("input", refreshTerritoriList);

function enterSelectMode(){
  isSelectMode = true;
  $("btnSelect").classList.add("on");
  $("btnSelect").textContent = "Fet";
  $("actionBar").classList.add("show");
  refreshTerritoriList();
}
function exitSelectMode(){
  isSelectMode = false;
  selectedSet.clear();
  $("btnSelect").classList.remove("on");
  $("btnSelect").textContent = "Seleccionar";
  $("actionBar").classList.remove("show");
  refreshTerritoriList();
}
$("btnSelect").addEventListener("click", ()=>{ isSelectMode ? exitSelectMode() : enterSelectMode(); });

$("btnMarkSel").addEventListener("click", ()=>{
  if (!selectedSet.size) return;
  for (const id of selectedSet) ensureMuniState(id).marked = true;
  saveUserState();
  refreshAllStyles();
  refreshTerritoriList();
});
$("btnUnmarkSel").addEventListener("click", ()=>{
  if (!selectedSet.size) return;
  for (const id of selectedSet) ensureMuniState(id).marked = false;
  saveUserState();
  refreshAllStyles();
  refreshTerritoriList();
});

const listEl = $("list");
listEl.addEventListener("scroll", ()=>{
  $("toTop").classList.toggle("show", listEl.scrollTop > 600);
}, {passive:true});
$("toTop").addEventListener("click", ()=>{ listEl.scrollTo({top:0, behavior:"smooth"}); });

function iconExperience(){
  return `<svg viewBox="0 0 24 24"><path d="M12 21s-7-4.6-7-11a7 7 0 0 1 14 0c0 6.4-7 11-7 11z"/></svg>`;
}
function iconGoal(){
  return `<svg viewBox="0 0 24 24"><path d="M12 2.6l2.8 6 6.6.6-5 4.3 1.5 6.4L12 16.8 6.1 20l1.5-6.4-5-4.3 6.6-.6L12 2.6z"/></svg>`;
}
function iconRoute(){
  return `<svg viewBox="0 0 24 24"><path d="M6 7c2 0 2 2 4 2s2-2 4-2 2 2 4 2"/><path d="M6 17c2 0 2-2 4-2s2 2 4 2 2-2 4-2"/><path d="M6 7v10"/><path d="M18 7v10"/></svg>`;
}

function shouldInclude(id){
  const st = ensureMuniState(id);
  if (filter==="marked") return !!st.marked;
  if (filter==="exp") return st.experiences.length>0;
  if (filter==="goals") return st.goals.length>0;
  if (filter==="routes") return st.routes.length>0;
  return true;
}
function escapeHtml(s){
  return (s??"").toString()
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#039;");
}

function refreshTerritoriList(){
  const q = normalizeText($("q").value);
  const rows = [];
  for (const m of MUNICIPIS){
    const id = String(m.codi).trim();
    if (!shouldInclude(id)) continue;
    if (q && !normalizeText(m.nom).includes(q)) continue;

    const st = ensureMuniState(id);
    rows.push({
      id,
      nom: m.nom,
      comarca: m.comarca || "—",
      provincia: m.provincia || "—",
      marked: !!st.marked,
      expN: st.experiences.length,
      goalsN: st.goals.length,
      routesN: st.routes.length
    });
  }
  rows.sort((a,b)=>{
    if (a.marked!==b.marked) return a.marked ? -1 : 1;
    return a.nom.localeCompare(b.nom, "ca");
  });

  const list = $("list");
  list.innerHTML = rows.slice(0, 900).map(r=>{
    const sel = selectedSet.has(r.id);
    const showDotFilled = isSelectMode ? sel : r.marked;
    return `
      <div class="row" data-id="${r.id}">
        <div class="selDot ${showDotFilled ? "filled":""}"></div>
        <div class="rowMain">
          <div class="rowTitle ${r.marked ? "marked":""}">${escapeHtml(r.nom)}</div>
          <div class="rowMeta">
            <span>${escapeHtml(r.comarca)} · ${escapeHtml(r.provincia)}</span>
            <span class="counts">
              <span>${iconExperience()}${r.expN}</span>
              <span>${iconGoal()}${r.goalsN}</span>
              <span>${iconRoute()}${r.routesN}</span>
            </span>
          </div>
        </div>
        <button class="rowGo" aria-label="Obrir detall">></button>
      </div>
    `;
  }).join("");

  for (const el of list.querySelectorAll(".row")){
    const id = el.getAttribute("data-id");
    const goBtn = el.querySelector(".rowGo");

    goBtn.addEventListener("click", (e)=>{
      e.stopPropagation();
      alert("Detall municipi (pendent).");
    });

    el.addEventListener("click", ()=>{
      if (isSelectMode){
        if (selectedSet.has(id)) selectedSet.delete(id);
        else selectedSet.add(id);
        refreshTerritoriList();
        return;
      }
      closeSheet();
      onMuniTap(id);
    });
  }
}

/* Loader */
async function tryLoadFromIdb(){
  const munis = await idbGet(IDB_KEYS.munis);
  const limits = await idbGet(IDB_KEYS.limits_muni);
  const com = await idbGet(IDB_KEYS.limits_com);
  if (munis && limits){
    MUNICIPIS = munis;
    LIMITS_MUNI_GJ = limits;
    LIMITS_COM_GJ = com || null;
    buildByCodi();
    return true;
  }
  return false;
}
function showLoader(show){ $("loader").style.display = show ? "flex" : "none"; }

$("btnReset").addEventListener("click", async () => {
  if (!confirm("Vols reiniciar els fitxers guardats i les marques?")) return;
  await idbClear();
  localStorage.removeItem(LS_KEY);
  location.reload();
});

$("btnLoad").addEventListener("click", async () => {
  const fMunis = $("fileMunis").files?.[0] || null;
  const fLimits = $("fileLimits").files?.[0] || null;
  const fCom = $("fileComarques").files?.[0] || null;

  if (!fMunis || !fLimits){ alert("Cal seleccionar municipis.json i limits_municipals.geojson."); return; }

  try{
    const munis = await readFileAsJson(fMunis);
    const limits = await readFileAsJson(fLimits);
    const com = fCom ? await readFileAsJson(fCom) : null;

    await idbSet(IDB_KEYS.munis, munis);
    await idbSet(IDB_KEYS.limits_muni, limits);
    if (com) await idbSet(IDB_KEYS.limits_com, com);

    MUNICIPIS = munis;
    LIMITS_MUNI_GJ = limits;
    LIMITS_COM_GJ = com;
    buildByCodi();

    showLoader(false);
    init();
  }catch(e){
    console.error(e);
    alert("Error llegint fitxers. Comprova que són JSON/GeoJSON vàlids.");
  }
});

async function init(){
  loadUserState();
  try{ setupMap(); } catch(e){ console.error(e); alert("Hi ha hagut un problema carregant el mapa."); }
  refreshTerritoriList();
  setTimeout(()=> map.invalidateSize(), 120);
}

(async function boot(){
  const ok = await tryLoadFromIdb();
  if (!ok) showLoader(true);
  else { showLoader(false); init(); }
})();
</script>
</body>
</html>
