<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Mappiter diagnòstic inicialització</title>
<script>
window.__T0 = performance.now();
window.__LOGS = [];
function __log(msg){
  const t = (performance.now() - window.__T0).toFixed(1);
  const line = "[" + t + " ms] " + msg;
  window.__LOGS.push(line);
  console.log(line);
  const el = document.getElementById("debug");
  if(el) el.textContent = window.__LOGS.join("\\n");
}
document.addEventListener("DOMContentLoaded", () => __log("DOMContentLoaded"));
window.addEventListener("load", () => __log("window.load"));
</script>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
<style>
:root{ --header-h:60px; }
html,body{
  margin:0;
  height:100%;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:#fff;
}
body{
  display:flex;
  flex-direction:column;
  min-height:100dvh;
  overflow:hidden;
}
#topBand{
  height:var(--header-h);
  min-height:var(--header-h);
  max-height:var(--header-h);
  flex:0 0 var(--header-h);
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  border-bottom:1px solid rgba(0,0,0,.08);
  box-shadow:0 2px 6px rgba(0,0,0,.08);
  z-index:10;
}
#topBand img{
  height:55px;
  max-width:90vw;
  object-fit:contain;
}
#mapWrap{
  position:relative;
  flex:1 1 auto;
  min-height:0;
}
#map{ position:absolute; inset:0; }
#centerBtn{
  position:fixed;
  right:16px;
  bottom:120px;
  width:46px;
  height:46px;
  border-radius:999px;
  background:#fff;
  border:none;
  box-shadow:0 4px 12px rgba(0,0,0,.25);
  font-size:20px;
  z-index:20;
}
#loading{
  position:fixed;
  left:12px;
  top:72px;
  z-index:30;
  background:rgba(255,255,255,.96);
  border:1px solid rgba(0,0,0,.12);
  border-radius:12px;
  padding:8px 10px;
  font-weight:700;
}
#debug{
  position:fixed;
  left:10px;
  right:10px;
  bottom:10px;
  max-height:42vh;
  overflow:auto;
  z-index:30;
  background:rgba(255,255,255,.97);
  border:1px solid rgba(0,0,0,.12);
  border-radius:14px;
  padding:10px 12px;
  font:12px/1.35 ui-monospace,SFMono-Regular,Menlo,monospace;
  white-space:pre-wrap;
  box-shadow:0 8px 20px rgba(0,0,0,.14);
}
</style>
</head>
<body>
<div id="topBand"><img id="logo" src="logo_mappiter_verd_sensefons.png" alt="Mappiter"></div>
<div id="mapWrap"><div id="map"></div></div>
<div id="loading">Diagnòstic inicialització…</div>
<div id="debug"></div>
<button id="centerBtn">⌖</button>

<script>
__log("script abans de maplibre js");
const logo = document.getElementById("logo");
if (logo.complete) {
  __log("logo ja carregat / en cache");
} else {
  logo.addEventListener("load", () => __log("logo load"));
  logo.addEventListener("error", () => __log("logo error"));
}
if (document.fonts && document.fonts.ready) {
  __log("document.fonts.ready existent");
  document.fonts.ready.then(() => __log("document.fonts.ready resolt"));
} else {
  __log("document.fonts.ready no disponible");
}
if ("requestIdleCallback" in window) {
  requestIdleCallback(() => __log("requestIdleCallback disparat"));
  __log("requestIdleCallback registrat");
} else {
  __log("requestIdleCallback no disponible");
}
setTimeout(() => __log("setTimeout(0) disparat"), 0);
requestAnimationFrame(() => {
  __log("requestAnimationFrame #1 disparat");
  requestAnimationFrame(() => __log("requestAnimationFrame #2 disparat"));
});
</script>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js" onload="__log('maplibre-gl.js load')"></script>
<script>
(async function(){
  __log("entrada a funció principal");

  function bounds(fc){
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    function scan(c){
      if(typeof c[0]==="number"){
        minX=Math.min(minX,c[0]); minY=Math.min(minY,c[1]);
        maxX=Math.max(maxX,c[0]); maxY=Math.max(maxY,c[1]);
      } else c.forEach(scan);
    }
    fc.features.forEach(f=>scan(f.geometry.coordinates));
    return [[minX,minY],[maxX,maxY]];
  }

  __log("abans fetch municipis");
  const municipis = await fetch("municipis_icgc_simplificat.json",{cache:"default"}).then(r=>r.json());
  __log("després fetch municipis");

  municipis.features = municipis.features.map(f => {
    if (f.properties && f.properties.CODIMUNI != null) f.id = f.properties.CODIMUNI;
    return f;
  });
  const catBounds = bounds(municipis);
  __log("bounds calculats");

  __log("abans createMap()");
  const map = new maplibregl.Map({
    container:"map",
    style:{version:8,sources:{},layers:[]},
    attributionControl:false,
    renderWorldCopies:false,
    dragRotate:false,
    pitchWithRotate:false,
    touchPitch:false,
    doubleClickZoom:false
  });
  __log("després createMap()");

  function fitInitial(){
    __log("fitInitial() entrada");
    map.resize();
    __log("map.resize() dins fitInitial");
    map.fitBounds(catBounds, { padding: 42, animate:false });
    __log("map.fitBounds() dins fitInitial");
  }

  map.on("load", () => {
    __log("EVENT map.load");
    map.addSource("municipis", { type:"geojson", data:municipis, promoteId:"CODIMUNI" });
    __log("addSource municipis");
    map.addLayer({
      id:"municipis-fill",
      type:"fill",
      source:"municipis",
      paint:{ "fill-color":"#f4f4f2" }
    });
    __log("addLayer municipis-fill");
    map.addLayer({
      id:"municipis-line",
      type:"line",
      source:"municipis",
      paint:{
        "line-color":"#B8B8B8",
        "line-width":[
          "interpolate",["linear"],["zoom"],
          6,0.5,
          8,0.8,
          10,1.2
        ]
      }
    });
    __log("addLayer municipis-line");
    fitInitial();
  });

  map.on("render", () => {
    if (!window.__firstRenderLogged) {
      window.__firstRenderLogged = true;
      __log("EVENT primer render visible");
      document.getElementById("loading").textContent = "Diagnòstic complet";
    }
  });

  __log("CONFIRMACIÓ: NO hi ha setMinZoom");
  __log("CONFIRMACIÓ: NO hi ha setMaxBounds");

  document.getElementById("centerBtn").addEventListener("click", fitInitial);
})();
</script>
</body>
</html>
