<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Mappiter</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
<style>
:root{ --header-h:60px; }
*{ box-sizing:border-box; }
html,body{
  margin:0;
  height:100%;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:#fff;
}
body{
  display:flex;
  flex-direction:column;
  min-height:100dvh;
  overflow:hidden;
}
header{
  height:var(--header-h);
  flex:0 0 var(--header-h);
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  border-bottom:1px solid #ddd;
  font-weight:700;
  font-size:18px;
}
#mapwrap{
  position:relative;
  flex:1 1 auto;
  min-height:0;
  background:#eef3f6;
}
#map{ position:absolute; inset:0; }
button{
  position:fixed;
  right:16px;
  width:48px;
  height:48px;
  border-radius:50%;
  border:none;
  background:#fff;
  box-shadow:0 4px 10px rgba(0,0,0,.2);
  z-index:20;
}
#center{ bottom:100px; }
#status{
  position:fixed;
  left:12px;
  top:72px;
  background:#ffffffee;
  border:1px solid #ddd;
  border-radius:12px;
  padding:8px 10px;
  z-index:30;
  font-weight:700;
}
#debug{
  position:fixed;
  left:12px;
  right:12px;
  bottom:12px;
  max-height:28vh;
  overflow:auto;
  background:#ffffffee;
  border:1px solid #ddd;
  border-radius:12px;
  padding:8px 10px;
  z-index:30;
  font:12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
  white-space:pre-wrap;
}
.maplibregl-ctrl-bottom-right,
.maplibregl-ctrl-bottom-left,
.maplibregl-ctrl-top-right,
.maplibregl-ctrl-top-left{
  display:none!important;
}
</style>
</head>
<body>
<header>Mappiter</header>
<div id="mapwrap"><div id="map"></div></div>
<div id="status">Carregant mapa…</div>
<button id="center" aria-label="Centrar Catalunya">⌖</button>
<div id="debug"></div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
function bounds(fc){
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  function scan(c){
    if(typeof c[0]==="number"){
      minX=Math.min(minX,c[0]);
      minY=Math.min(minY,c[1]);
      maxX=Math.max(maxX,c[0]);
      maxY=Math.max(maxY,c[1]);
    } else {
      c.forEach(scan);
    }
  }
  fc.features.forEach(f=>scan(f.geometry.coordinates));
  return [[minX,minY],[maxX,maxY]];
}

function log(msg){
  const el = document.getElementById("debug");
  el.textContent += msg + "\n";
  console.log(msg);
}

document.addEventListener("DOMContentLoaded", init);

async function init(){
  const status = document.getElementById("status");

  try{
    const municipis = await fetch("municipis_icgc_simplificat.json").then(async r=>{
      if(!r.ok){
        throw new Error("No s'ha pogut carregar municipis_icgc_simplificat.json (" + r.status + ")");
      }
      return r.json();
    });

    municipis.features = municipis.features.map(f=>{
      if(f.properties && f.properties.CODIMUNI != null) f.id = f.properties.CODIMUNI;
      return f;
    });

    const catBounds = bounds(municipis);

    const map = new maplibregl.Map({
      container:"map",
      style:{version:8,sources:{},layers:[]},
      attributionControl:false,
      renderWorldCopies:false,
      dragRotate:false,
      pitchWithRotate:false,
      touchPitch:false,
      doubleClickZoom:false
    });

    map.dragRotate.disable();
    map.touchZoomRotate.disableRotation();

    let initialCamera = null;

    function applyInitialCamera(){
      if(!initialCamera) return;
      map.resize();
      map.jumpTo(initialCamera);
      log("zoom després de jumpTo = " + map.getZoom().toFixed(3));
    }

    map.on("load",()=>{
      map.addSource("municipis",{
        type:"geojson",
        data:municipis,
        promoteId:"CODIMUNI"
      });

      map.addLayer({
        id:"municipis-fill",
        type:"fill",
        source:"municipis",
        paint:{ "fill-color":"#f4f4f2" }
      });

      map.addLayer({
        id:"municipis-line",
        type:"line",
        source:"municipis",
        paint:{
          "line-color":"#B8B8B8",
          "line-width":[
            "interpolate",["linear"],["zoom"],
            6,0.3,
            8,0.6,
            10,1.0
          ]
        }
      });

      map.resize();

      initialCamera = map.cameraForBounds(catBounds, {padding: 30});
      initialCamera.bearing = 0;
      initialCamera.pitch = 0;

      log("initialCamera.zoom = " + initialCamera.zoom.toFixed(3));
      map.jumpTo(initialCamera);
      log("zoom després de jumpTo = " + map.getZoom().toFixed(3));

      setTimeout(()=>{
        log("zoom 1 segon després = " + map.getZoom().toFixed(3));
      }, 1000);
    });

    map.on("render",()=>{
      if(!window.__firstRenderDone){
        window.__firstRenderDone = true;
        status.style.display = "none";
      }
    });

    document.getElementById("center").addEventListener("click", applyInitialCamera);

  }catch(err){
    status.textContent = "Error carregant mapa";
    log(String(err));
    console.error(err);
  }
}
</script>
</body>
</html>
