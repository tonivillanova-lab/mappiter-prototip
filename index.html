<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Mappiter reconstrucció estable v1</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
<style>
:root{
  --header-h:60px;
}
html,body{
  margin:0;
  height:100%;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:#fff;
}
body{
  display:flex;
  flex-direction:column;
  min-height:100dvh;
  overflow:hidden;
}
#topBand{
  height:var(--header-h);
  min-height:var(--header-h);
  max-height:var(--header-h);
  flex:0 0 var(--header-h);
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  border-bottom:1px solid rgba(0,0,0,.08);
  box-shadow:0 2px 6px rgba(0,0,0,.08);
  z-index:10;
}
#topBand img{
  height:55px;
  max-width:90vw;
  object-fit:contain;
}
#mapWrap{
  position:relative;
  flex:1 1 auto;
  min-height:0;
}
#map{
  position:absolute;
  inset:0;
}
#centerBtn{
  position:fixed;
  right:16px;
  bottom:120px;
  width:46px;
  height:46px;
  border-radius:999px;
  background:#fff;
  border:none;
  box-shadow:0 4px 12px rgba(0,0,0,.25);
  font-size:20px;
  z-index:20;
}
#loading{
  position:fixed;
  left:12px;
  top:72px;
  z-index:30;
  background:rgba(255,255,255,.96);
  border:1px solid rgba(0,0,0,.12);
  border-radius:12px;
  padding:8px 10px;
  font-weight:700;
}
#debug{
  position:fixed;
  left:10px;
  right:10px;
  bottom:10px;
  max-height:34vh;
  overflow:auto;
  z-index:30;
  background:rgba(255,255,255,.97);
  border:1px solid rgba(0,0,0,.12);
  border-radius:14px;
  padding:10px 12px;
  font:12px/1.35 ui-monospace,SFMono-Regular,Menlo,monospace;
  white-space:pre-wrap;
  box-shadow:0 8px 20px rgba(0,0,0,.14);
}
</style>
</head>
<body>
<div id="topBand"><img src="logo_mappiter_verd_sensefons.png" alt="Mappiter"></div>
<div id="mapWrap"><div id="map"></div></div>
<div id="loading">Reconstrucció estable…</div>
<div id="debug"></div>
<button id="centerBtn">⌖</button>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
(async function(){
  const debugEl = document.getElementById('debug');
  const loadingEl = document.getElementById('loading');

  function log(msg){
    debugEl.textContent += msg + "\n";
    console.log(msg);
  }
  function fmtCoord(c){ return c.lng.toFixed(5) + ", " + c.lat.toFixed(5); }
  function bounds(fc){
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    function scan(c){
      if(typeof c[0]==="number"){
        minX=Math.min(minX,c[0]); minY=Math.min(minY,c[1]);
        maxX=Math.max(maxX,c[0]); maxY=Math.max(maxY,c[1]);
      }else c.forEach(scan);
    }
    fc.features.forEach(f=>scan(f.geometry.coordinates));
    return [[minX,minY],[maxX,maxY]];
  }

  const municipis = await fetch("municipis_icgc_simplificat.json",{cache:"default"}).then(r=>r.json());
  municipis.features = municipis.features.map(f => {
    if (f.properties && f.properties.CODIMUNI != null) f.id = f.properties.CODIMUNI;
    return f;
  });
  const catBounds = bounds(municipis);

  const map = new maplibregl.Map({
    container:"map",
    style:{version:8,sources:{},layers:[]},
    attributionControl:false,
    renderWorldCopies:false,
    dragRotate:false,
    pitchWithRotate:false,
    touchPitch:false,
    doubleClickZoom:false
  });

  function fitInitial(){
    map.resize();
    map.fitBounds(catBounds, { padding: 42, animate:false });
    log("fitInitial -> zoom=" + map.getZoom().toFixed(3) + " center=" + fmtCoord(map.getCenter()));
  }

  map.on("load", () => {
    log("EVENT load");
    map.addSource("municipis", { type:"geojson", data:municipis, promoteId:"CODIMUNI" });
    log("addSource municipis");

    map.addLayer({
      id:"municipis-fill",
      type:"fill",
      source:"municipis",
      paint:{ "fill-color":"#f4f4f2" }
    });
    log("addLayer municipis-fill");

    map.addLayer({
      id:"municipis-line",
      type:"line",
      source:"municipis",
      paint:{
        "line-color":"#B8B8B8",
        "line-width":[
          "interpolate",["linear"],["zoom"],
          6,0.5,
          8,0.8,
          10,1.2
        ]
      }
    });
    log("addLayer municipis-line");

    fitInitial();

    setTimeout(() => {
      log("zoom 1 segon després = " + map.getZoom().toFixed(3));
      log("center 1 segon després = " + fmtCoord(map.getCenter()));
      loadingEl.textContent = "Reconstrucció estable carregada";
    }, 1000);
  });

  document.getElementById("centerBtn").addEventListener("click", fitInitial);
})();
</script>
</body>
</html>
