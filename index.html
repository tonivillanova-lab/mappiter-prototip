<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Mappiter debug càmera mínima</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
<style>
html,body{
  margin:0;
  height:100%;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:#fff;
}
#map{
  position:fixed;
  inset:0;
}
#debug{
  position:fixed;
  left:10px;
  right:10px;
  bottom:10px;
  max-height:42vh;
  overflow:auto;
  z-index:30;
  background:rgba(255,255,255,.97);
  border:1px solid rgba(0,0,0,.12);
  border-radius:14px;
  padding:10px 12px;
  font:12px/1.35 ui-monospace,SFMono-Regular,Menlo,monospace;
  white-space:pre-wrap;
  box-shadow:0 8px 20px rgba(0,0,0,.14);
}
#loading{
  position:fixed;
  left:12px;
  top:12px;
  z-index:30;
  background:rgba(255,255,255,.96);
  border:1px solid rgba(0,0,0,.12);
  border-radius:12px;
  padding:8px 10px;
  font-weight:700;
}
</style>
</head>
<body>
<div id="map"></div>
<div id="loading">Prova mínima de càmera…</div>
<div id="debug"></div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
(async function(){
  const debugEl = document.getElementById('debug');
  const loadingEl = document.getElementById('loading');
  const counts = {
    fitBounds:0, easeTo:0, flyTo:0, jumpTo:0, setZoom:0, setCenter:0, setMinZoom:0, setMaxBounds:0,
    movestart:0, moveend:0, zoomstart:0, zoomend:0
  };

  function log(msg){
    debugEl.textContent += msg + "\\n";
    console.log(msg);
  }
  function logCounts(){
    log("\\nCOUNTS\\n" + JSON.stringify(counts, null, 2));
  }
  function fmtCoord(c){ return c.lng.toFixed(5) + ", " + c.lat.toFixed(5); }
  function bounds(fc){
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    function scan(c){
      if(typeof c[0]==="number"){
        minX=Math.min(minX,c[0]); minY=Math.min(minY,c[1]);
        maxX=Math.max(maxX,c[0]); maxY=Math.max(maxY,c[1]);
      }else c.forEach(scan);
    }
    fc.features.forEach(f=>scan(f.geometry.coordinates));
    return [[minX,minY],[maxX,maxY]];
  }

  log("=== PROVA MÍNIMA CÀMERA ===");
  log("Sense header, sense controls, sense minZoom, sense maxBounds, sense window.onload");
  log("window.innerWidth = " + window.innerWidth);
  log("window.innerHeight = " + window.innerHeight);

  const municipis = await fetch("municipis_icgc_simplificat.json",{cache:"default"}).then(r=>r.json());
  municipis.features = municipis.features.map(f => {
    if (f.properties && f.properties.CODIMUNI != null) f.id = f.properties.CODIMUNI;
    return f;
  });
  const catBounds = bounds(municipis);

  const map = new maplibregl.Map({
    container:"map",
    style:{version:8,sources:{},layers:[]},
    attributionControl:false,
    renderWorldCopies:false,
    dragRotate:false,
    pitchWithRotate:false,
    touchPitch:false,
    doubleClickZoom:false
  });

  // wrap camera methods
  function wrapMethod(name){
    const original = map[name].bind(map);
    map[name] = function(){
      counts[name] += 1;
      const z = map.getZoom ? map.getZoom() : "n/a";
      const c = map.getCenter ? map.getCenter() : null;
      log("CALL " + name + " #" + counts[name] + " | before zoom=" + (typeof z === "number" ? z.toFixed(3) : z) + (c ? " center=" + fmtCoord(c) : ""));
      return original(...arguments);
    }
  }
  ["fitBounds","easeTo","flyTo","jumpTo","setZoom","setCenter","setMinZoom","setMaxBounds"].forEach(wrapMethod);

  ["movestart","moveend","zoomstart","zoomend"].forEach(ev=>{
    map.on(ev, ()=>{
      counts[ev] += 1;
      log("EVENT " + ev + " #" + counts[ev] + " | zoom=" + map.getZoom().toFixed(3) + " center=" + fmtCoord(map.getCenter()));
    });
  });

  map.on("load", ()=>{
    log("EVENT load");
    map.addSource("municipis", { type:"geojson", data:municipis, promoteId:"CODIMUNI" });
    log("addSource municipis");

    map.addLayer({
      id:"municipis-fill",
      type:"fill",
      source:"municipis",
      paint:{ "fill-color":"#f4f4f2" }
    });
    log("addLayer municipis-fill");

    map.addLayer({
      id:"municipis-line",
      type:"line",
      source:"municipis",
      paint:{
        "line-color":"#B8B8B8",
        "line-width":[
          "interpolate",["linear"],["zoom"],
          6,0.5,
          8,0.8,
          10,1.2
        ]
      }
    });
    log("addLayer municipis-line");

    map.resize();
    log("map.resize() manual");

    log("zoom abans fitBounds = " + map.getZoom().toFixed(3));
    log("center abans fitBounds = " + fmtCoord(map.getCenter()));
    map.fitBounds(catBounds, { padding:60, animate:false });
    log("zoom immediat després fitBounds = " + map.getZoom().toFixed(3));
    log("center immediat després fitBounds = " + fmtCoord(map.getCenter()));

    setTimeout(()=>{
      log("zoom 1 segon després = " + map.getZoom().toFixed(3));
      log("center 1 segon després = " + fmtCoord(map.getCenter()));
      logCounts();
      loadingEl.textContent = "Prova mínima completada";
    }, 1000);
  });
})();
</script>
</body>
</html>
