<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Mappiter inici ràpid</title>

<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>

<style>
:root{ --header-h:60px; }

html,body{
  margin:0;
  height:100%;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:#fff;
}

body{
  display:flex;
  flex-direction:column;
  min-height:100dvh;
  overflow:hidden;
}

#topBand{
  height:var(--header-h);
  flex:0 0 var(--header-h);
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  border-bottom:1px solid rgba(0,0,0,.08);
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}

#topBand img{
  height:55px;
  max-width:90vw;
}

#mapWrap{
  flex:1 1 auto;
  position:relative;
}

#map{
  position:absolute;
  inset:0;
}

#centerBtn{
  position:fixed;
  right:16px;
  bottom:120px;
  width:46px;
  height:46px;
  border-radius:999px;
  background:#fff;
  border:none;
  box-shadow:0 4px 12px rgba(0,0,0,.25);
  font-size:20px;
}

#debug{
  position:fixed;
  left:10px;
  right:10px;
  bottom:10px;
  max-height:35vh;
  overflow:auto;
  background:#ffffffee;
  border:1px solid #ccc;
  border-radius:10px;
  padding:8px;
  font:12px monospace;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div id="topBand">
<img src="logo_mappiter_verd_sensefons.png" alt="Mappiter">
</div>

<div id="mapWrap">
<div id="map"></div>
</div>

<button id="centerBtn">⌖</button>
<div id="debug"></div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

<script>
const T0 = performance.now()
function log(t){ 
  const s = "[" + (performance.now()-T0).toFixed(1) + " ms] " + t
  console.log(s)
  document.getElementById("debug").textContent += s + "\n"
}

document.addEventListener("DOMContentLoaded", async () => {

log("DOMContentLoaded")

function bounds(fc){
 let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity
 function scan(c){
  if(typeof c[0]==="number"){
   minX=Math.min(minX,c[0]); minY=Math.min(minY,c[1])
   maxX=Math.max(maxX,c[0]); maxY=Math.max(maxY,c[1])
  } else c.forEach(scan)
 }
 fc.features.forEach(f=>scan(f.geometry.coordinates))
 return [[minX,minY],[maxX,maxY]]
}

log("fetch municipis")
const municipis = await fetch("municipis_icgc_simplificat.json",{cache:"default"}).then(r=>r.json())
log("municipis carregats")

municipis.features = municipis.features.map(f=>{
 if(f.properties && f.properties.CODIMUNI!=null) f.id=f.properties.CODIMUNI
 return f
})

const catBounds = bounds(municipis)
log("bounds calculats")

log("createMap()")
const map = new maplibregl.Map({
 container:"map",
 style:{version:8,sources:{},layers:[]},
 attributionControl:false,
 renderWorldCopies:false,
 dragRotate:false,
 pitchWithRotate:false,
 touchPitch:false,
 doubleClickZoom:false
})

function fitInitial(){
 log("fitInitial()")
 map.resize()
 map.fitBounds(catBounds,{padding:36,animate:false})
}

map.on("load",()=>{

 log("map.load")

 map.addSource("municipis",{type:"geojson",data:municipis,promoteId:"CODIMUNI"})
 log("addSource")

 map.addLayer({
  id:"municipis-fill",
  type:"fill",
  source:"municipis",
  paint:{ "fill-color":"#f4f4f2" }
 })

 map.addLayer({
  id:"municipis-line",
  type:"line",
  source:"municipis",
  paint:{
   "line-color":"#B8B8B8",
   "line-width":[
    "interpolate",["linear"],["zoom"],
    6,0.5,
    8,0.8,
    10,1.2
   ]
  }
 })

 log("layers creades")

 // única espera opcional molt curta
 setTimeout(()=>{
   fitInitial()
 },0)

})

map.on("render",()=>{
 if(!window.__renderLogged){
  window.__renderLogged=true
  log("primer render visible")
 }
})

document.getElementById("centerBtn").addEventListener("click",fitInitial)

log("CONFIRMACIÓ: sense requestAnimationFrame")
log("CONFIRMACIÓ: sense requestIdleCallback")
log("CONFIRMACIÓ: sense minZoom")
log("CONFIRMACIÓ: sense maxBounds")

})
</script>

</body>
</html>
