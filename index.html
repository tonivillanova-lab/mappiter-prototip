<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Mappiter</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#08262B">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
<style>
:root{
  --header-h:60px;
  --bg-center:#0F3F46;
  --bg-mid:#0C3238;
  --bg-edge:#08262B;
  --focus-x:50%;
  --focus-y:52%;
}
*{box-sizing:border-box}
html,body{
  margin:0;
  height:100%;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:#08262B;
}
body{
  display:flex;
  flex-direction:column;
  min-height:100dvh;
  overflow:hidden;
  background:#08262B;
}
header{
  height:var(--header-h);
  flex:0 0 var(--header-h);
  background:rgba(8,38,43,.84);
  color:#F3F1EC;
  display:flex;
  align-items:center;
  justify-content:center;
  border-bottom:1px solid rgba(243,241,236,.12);
  font-weight:700;
  font-size:18px;
  backdrop-filter:blur(6px);
}
#mapwrap{
  position:relative;
  flex:1 1 auto;
  min-height:0;
  background:
    radial-gradient(120% 95% at var(--focus-x) var(--focus-y),
      var(--bg-center) 0%,
      var(--bg-mid) 54%,
      var(--bg-edge) 100%);
}
#shadowCanvas{
  position:absolute;
  inset:0;
  z-index:0;
  pointer-events:none;
}
#map{
  position:absolute;
  inset:0;
  z-index:1;
}
button{
  position:fixed;
  right:16px;
  width:48px;
  height:48px;
  border-radius:50%;
  border:none;
  background:rgba(243,241,236,.96);
  color:#08262B;
  box-shadow:0 4px 10px rgba(0,0,0,.25);
  z-index:20;
}
#center{bottom:100px}
#status{
  position:fixed;
  left:12px;
  top:72px;
  background:rgba(8,38,43,.9);
  color:#F3F1EC;
  border:1px solid rgba(243,241,236,.14);
  border-radius:12px;
  padding:8px 10px;
  z-index:30;
  font-weight:700;
}
#legend{
  position:fixed;
  left:12px;
  right:76px;
  bottom:12px;
  background:rgba(8,38,43,.9);
  color:#F3F1EC;
  border:1px solid rgba(243,241,236,.14);
  border-radius:14px;
  padding:10px 12px;
  z-index:30;
  font-size:13px;
  line-height:1.35;
  backdrop-filter:blur(6px);
}
.legend-row{display:flex;align-items:center;gap:8px;margin-top:6px}
.legend-row:first-child{margin-top:0}
.swatch{
  width:14px;
  height:14px;
  border-radius:4px;
  border:1px solid rgba(255,255,255,.18);
  flex:0 0 14px;
}
.maplibregl-ctrl-bottom-right,
.maplibregl-ctrl-bottom-left,
.maplibregl-ctrl-top-right,
.maplibregl-ctrl-top-left{display:none!important}
</style>
</head>
<body>
<header>Mappiter</header>

<div id="mapwrap">
  <canvas id="shadowCanvas"></canvas>
  <div id="map"></div>
</div>

<div id="status">Carregant mapa…</div>
<button id="center" aria-label="Centrar Catalunya">⌖</button>

<div id="legend">
  <div class="legend-row"><span class="swatch" style="background:#F3F1EC"></span> municipi no marcat</div>
  <div class="legend-row"><span class="swatch" style="background:#1ECAD3"></span> municipi marcat</div>
  <div class="legend-row"><span class="swatch" style="background:#0B4F8A"></span> municipi amb vivències</div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
function bounds(fc){
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  function scan(c){
    if(typeof c[0]==="number"){
      minX=Math.min(minX,c[0]); minY=Math.min(minY,c[1]);
      maxX=Math.max(maxX,c[0]); maxY=Math.max(maxY,c[1]);
    } else {
      c.forEach(scan);
    }
  }
  fc.features.forEach(f=>scan(f.geometry.coordinates));
  return [[minX,minY],[maxX,maxY]];
}
function expandBounds(b,f){
  const minX=b[0][0], minY=b[0][1], maxX=b[1][0], maxY=b[1][1];
  const dx=(maxX-minX)*f, dy=(maxY-minY)*f;
  return [[minX-dx,minY-dy],[maxX+dx,maxY+dy]];
}
function clamp(n,min,max){ return Math.min(max, Math.max(min,n)); }

document.addEventListener("DOMContentLoaded", init);

async function init(){
  const status=document.getElementById("status");
  const mapwrap=document.getElementById("mapwrap");
  const shadowCanvas=document.getElementById("shadowCanvas");
  const municipis=await fetch("municipis_icgc_simplificat.json").then(r=>r.json());

  municipis.features = municipis.features.map((f, i)=>{
    if(f.properties && f.properties.CODIMUNI != null) f.id = f.properties.CODIMUNI;
    if(!f.properties) f.properties = {};
    // mostra temporal per validar paleta
    if(i < 18) f.properties.demo_state = "marked";
    else if(i < 36) f.properties.demo_state = "lived";
    else f.properties.demo_state = "default";
    return f;
  });

  const catBounds=bounds(municipis);
  const expandedBounds=expandBounds(catBounds,0.003);
  const catCenter=[(catBounds[0][0]+catBounds[1][0])/2,(catBounds[0][1]+catBounds[1][1])/2];

  const map=new maplibregl.Map({
    container:"map",
    style:{version:8,sources:{},layers:[]},
    attributionControl:false,
    renderWorldCopies:false,
    dragRotate:false,
    pitchWithRotate:false,
    touchPitch:false
  });

  map.dragRotate.disable();
  map.touchZoomRotate.disableRotation();

  let initialCamera=null;
  let suppress=false;
  let shadowScheduled=false;

  function updateBackgroundFocus(){
    const p = map.project(catCenter);
    const x = Math.max(0, Math.min(mapwrap.clientWidth, p.x));
    const y = Math.max(0, Math.min(mapwrap.clientHeight, p.y));
    mapwrap.style.setProperty("--focus-x", x + "px");
    mapwrap.style.setProperty("--focus-y", y + "px");
  }

  function drawShadow(){
    const dpr = window.devicePixelRatio || 1;
    const w = mapwrap.clientWidth;
    const h = mapwrap.clientHeight;
    shadowCanvas.width = Math.round(w * dpr);
    shadowCanvas.height = Math.round(h * dpr);
    shadowCanvas.style.width = w + "px";
    shadowCanvas.style.height = h + "px";

    const ctx = shadowCanvas.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, w, h);

    ctx.save();
    ctx.translate(6, 8);
    ctx.filter = "blur(3px)";
    ctx.fillStyle = "rgba(0,0,0,0.22)";
    ctx.beginPath();

    function drawCoords(coords){
      coords.forEach((ring, ringIndex)=>{
        ring.forEach((pt, i)=>{
          const p = map.project([pt[0], pt[1]]);
          if(i === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        });
        ctx.closePath();
      });
    }

    municipis.features.forEach(f=>{
      const g = f.geometry;
      if(!g) return;
      if(g.type === "Polygon") drawCoords(g.coordinates);
      else if(g.type === "MultiPolygon") g.coordinates.forEach(drawCoords);
    });

    ctx.fill("evenodd");
    ctx.restore();
  }

  function scheduleShadow(){
    if(shadowScheduled) return;
    shadowScheduled = true;
    requestAnimationFrame(()=>{
      shadowScheduled = false;
      updateBackgroundFocus();
      drawShadow();
    });
  }

  function centerMap(){
    if(!initialCamera) return;
    suppress=true;
    map.jumpTo(initialCamera);
    scheduleShadow();
    setTimeout(()=>suppress=false,0);
  }

  map.on("load",()=>{
    map.addSource("municipis",{type:"geojson",data:municipis,promoteId:"id"});

    map.addLayer({
      id:"municipis-fill",
      type:"fill",
      source:"municipis",
      paint:{
        "fill-color":[
          "match",
          ["get","demo_state"],
          "lived", "#0B4F8A",
          "marked", "#1ECAD3",
          "#F3F1EC"
        ]
      }
    });

    map.addLayer({
      id:"municipis-line",
      type:"line",
      source:"municipis",
      paint:{
        "line-color":"#CFCBC3",
        "line-width":[
          "interpolate",["linear"],["zoom"],
          6,0.25,
          8,0.55,
          10,0.9
        ]
      }
    });

    map.resize();

    initialCamera = map.cameraForBounds(catBounds,{padding:18});
    initialCamera.bearing=0;
    initialCamera.pitch=0;

    map.jumpTo(initialCamera);

    map.setMinZoom(6.1);
    map.setMaxZoom(10.5);

    scheduleShadow();
    status.style.display="none";
  });

  map.on("move", scheduleShadow);
  map.on("zoom", scheduleShadow);
  window.addEventListener("resize", scheduleShadow);

  map.on("moveend",()=>{
    if(suppress || !initialCamera) return;

    const c=map.getCenter();
    const minLng=expandedBounds[0][0];
    const minLat=expandedBounds[0][1];
    const maxLng=expandedBounds[1][0];
    const maxLat=expandedBounds[1][1];

    const lng=clamp(c.lng,minLng,maxLng);
    const lat=clamp(c.lat,minLat,maxLat);

    if(lng!==c.lng || lat!==c.lat){
      suppress=true;
      map.easeTo({
        center:[lng,lat],
        zoom:map.getZoom(),
        duration:200,
        essential:true
      });
      setTimeout(()=>suppress=false,220);
    }
  });

  document.getElementById("center").addEventListener("click",centerMap);
}
</script>
</body>
</html>
