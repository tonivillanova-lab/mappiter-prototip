<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Mappiter</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#08262B">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
<style>
html,body{margin:0;height:100%;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#08262B;overflow:hidden}
#mapwrap{position:fixed;inset:0;background:radial-gradient(circle at 50% 43%, #1C6D76 0%, #15565F 25%, #0F3F46 45%, #0C3238 70%, #08262B 100%)}
#topbar{position:fixed;top:10px;left:12px;right:12px;height:56px;z-index:35;display:grid;grid-template-columns:44px 1fr auto;align-items:center;gap:10px;padding:0 10px;border-radius:18px;background:#FFFFFF;backdrop-filter:blur(10px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.topbtn{height:40px;width:40px;min-width:40px;border:none;border-radius:12px;background:transparent;color:#17333a;font:inherit;font-weight:700;padding:0;display:grid;place-items:center;font-size:20px}
#topbar-logo{justify-self:center;height:34px;width:auto;display:block;filter:none}
#topbar-list{justify-self:end;display:flex;gap:6px}
.icon-svg{width:22px;height:22px;display:block}
.icon-svg path,.icon-svg line,.icon-svg rect{stroke:currentColor;fill:none;stroke-width:2.0;stroke-linecap:round;stroke-linejoin:round}
.icon-svg circle{fill:currentColor;stroke:none}
#map{position:absolute;inset:0;z-index:1}
#center{position:fixed;right:16px;bottom:16px;width:48px;height:48px;border-radius:50%;border:none;background:rgba(242,245,247,.96);color:#38515d;box-shadow:0 4px 10px rgba(0,0,0,.14);z-index:20;font:inherit}
#status{position:fixed;left:12px;top:64px;background:rgba(8,38,43,.9);color:#F3F1EC;border:1px solid rgba(243,241,236,.14);border-radius:12px;padding:8px 10px;z-index:30;font-weight:700}
#municipi-card{position:fixed;z-index:40;min-width:262px;max-width:340px;max-height:min(72vh,560px);display:flex;flex-direction:column;background:linear-gradient(180deg, rgba(12,50,56,.96) 0%, rgba(8,38,43,.98) 100%);color:#F3F1EC;border:1px solid rgba(243,241,236,.07);border-radius:18px;padding:12px 14px 12px;box-shadow:0 10px 22px rgba(0,0,0,.24);transform:translate(-50%, 8px) scale(.985);opacity:0;pointer-events:none;transition:transform 170ms ease, opacity 170ms ease}
#municipi-card.open{opacity:1;pointer-events:auto;transform:translate(-50%, 0) scale(1)}
#municipi-card .card-top{display:flex;justify-content:space-between;align-items:start;gap:8px;flex:0 0 auto}
#municipi-card .title{font-size:24px;line-height:1.08;font-weight:700;letter-spacing:-.015em;margin:0 0 4px 0;color:#F4F2EC}
#municipi-card .meta{font-size:15px;line-height:1.25;color:#D0DEE1;margin:0 0 10px 0}
#municipi-card .card-divider{height:1px;background:rgba(255,255,255,.08);margin:0 0 10px 0}
#municipi-card .summary{font-size:15px;line-height:1.35;color:#EDF4F5;margin:0 0 12px 0}
#municipi-card .actions{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
#municipi-card .primary{height:42px;border:none;border-radius:999px;padding:0 14px;background:#2aaab3;color:#F9FEFF;font-weight:700;box-shadow:none;font:inherit}
#municipi-card .iconbtn{width:40px;height:40px;border:none;border-radius:999px;background:rgba(243,241,236,.08);color:#F3F1EC;box-shadow:inset 0 0 0 1px rgba(243,241,236,.08);font-size:19px;font-weight:700;font:inherit}
#municipi-card .closebtn{width:30px;height:30px;border:none;border-radius:999px;background:rgba(243,241,236,.06);color:#DCE7E9;font-size:16px;line-height:1;font-weight:700}
#municipi-card .card-body{flex:1 1 auto;min-height:0;overflow-y:auto;overscroll-behavior:contain;padding-right:2px}

.extra{display:none;margin-top:10px;border-top:1px solid rgba(255,255,255,.08);padding-top:10px;grid-template-columns:1fr 1fr;gap:8px}
.extra.open{display:grid;overflow:visible}
.extra button{width:100%;height:42px;border:none;border-radius:12px;background:rgba(243,241,236,.10);color:#F3F1EC;text-align:left;padding:0 10px;margin:0;font:inherit;font-weight:600}.extra button.full{grid-column:1 / -1}
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(8px);background:rgba(8,38,43,.96);color:#F3F1EC;border:1px solid rgba(243,241,236,.10);border-radius:999px;padding:10px 14px;opacity:0;pointer-events:none;z-index:50;transition:opacity 160ms ease, transform 160ms ease;font-size:14px}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;z-index:60}
#confirm-overlay.open{display:block}
#confirm-dialog{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:min(320px,calc(100vw - 32px));background:rgba(8,38,43,.98);color:#F3F1EC;border:1px solid rgba(243,241,236,.08);border-radius:18px;padding:16px;box-shadow:0 18px 36px rgba(0,0,0,.35)}
#confirm-dialog h3{margin:0 0 8px 0;font-size:18px}
#confirm-dialog p{margin:0 0 14px 0;color:#D0DEE1;line-height:1.35}
#confirm-dialog button{width:100%;height:44px;border:none;border-radius:12px;margin-top:8px;font:inherit}
#confirm-dialog .danger{background:#b84c4c;color:white}
#confirm-dialog .soft{background:rgba(243,241,236,.10);color:#F3F1EC}
#confirm-dialog .cancel{background:transparent;color:#D0DEE1;border:1px solid rgba(243,241,236,.10)}

#municipis-list-screen{position:fixed;inset:0;z-index:45;background:#F7F7F4;color:#17333a;display:none;flex-direction:column}
#municipis-list-screen.open{display:flex}
#municipis-list-header{display:flex;align-items:center;gap:10px;padding:10px 12px 8px;background:#FFFFFF;border-bottom:1px solid rgba(23,51,58,.08);min-height:56px;box-sizing:border-box;position:relative;z-index:2;flex:0 0 auto}
#municipis-list-back{width:40px;height:40px;border:none;border-radius:12px;background:rgba(8,38,43,.06);color:#17333a;display:flex;align-items:center;justify-content:center;padding:0;flex:0 0 40px}
#municipis-list-back svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
#municipis-list-title{font-size:18px;font-weight:700;line-height:1.2}
#municipis-list-tools{padding:10px 12px 8px;background:#FFFFFF;border-bottom:1px solid rgba(23,51,58,.08);position:relative;z-index:3;flex:0 0 auto}
.municipis-search-row{display:flex;align-items:center;gap:8px}
#municipis-search{width:100%;height:42px;border:1px solid rgba(23,51,58,.12);border-radius:12px;background:#F7F7F4;color:#17333a;padding:0 14px;box-sizing:border-box;font:inherit;font-size:15px;outline:none;flex:1 1 auto;min-width:0}
#municipis-search:focus{border-color:rgba(23,51,58,.28)}
#municipis-search-cancel{display:none;height:42px;border:none;background:transparent;color:#17333a;font:inherit;font-size:15px;font-weight:600;padding:0 4px;flex:0 0 auto}
#municipis-filters{display:flex;gap:8px;overflow-x:auto;padding:10px 0 2px;-webkit-overflow-scrolling:touch;scrollbar-width:none;transition:opacity 120ms ease}
#municipis-list-screen.search-mode #municipis-list-header{display:none}
#municipis-list-screen.search-mode #municipis-filters{display:none}
#municipis-list-screen.search-mode #municipis-search-cancel{display:block}
#municipis-filters::-webkit-scrollbar{display:none}
.filter-pill{height:34px;border:none;border-radius:999px;background:#EEF1EF;color:#395057;padding:0 12px;font:inherit;font-size:14px;font-weight:600;white-space:nowrap}
.filter-pill.active{background:#17333a;color:#FFFFFF}
#municipis-list{flex:1 1 auto;overflow:auto;background:#F7F7F4;-webkit-overflow-scrolling:touch}
.municipi-list-row{width:100%;border:none;border-bottom:1px solid rgba(23,51,58,.08);background:transparent;padding:11px 12px;text-align:left;color:inherit;font:inherit;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:center}
.municipi-list-row:active{background:rgba(23,51,58,.05)}
.municipi-list-main{min-width:0;display:grid;grid-template-columns:10px minmax(0,1fr);column-gap:8px;align-items:center}
.municipi-list-name{font-size:15px;font-weight:700;line-height:1.2;color:#17333a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.municipi-list-meta{font-size:13px;line-height:1.2;color:#5F7278;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:4px}
.municipi-list-marker{width:10px;display:flex;align-items:center;justify-content:center;box-sizing:border-box;align-self:center;height:100%}
.municipi-list-marker-dot{width:7px;height:7px;border-radius:50%;background:#1ECAD3;opacity:.65;display:block}
.municipi-list-side{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:4px;flex:0 0 auto}
.municipi-list-counts{font-size:12px;line-height:1.1;color:#17333a;font-weight:700}
#municipis-empty{display:none;padding:18px 12px;color:#5F7278;font-size:14px}
#municipis-empty.show{display:block}

.maplibregl-ctrl-bottom-right,.maplibregl-ctrl-bottom-left,.maplibregl-ctrl-top-right,.maplibregl-ctrl-top-left{display:none!important}
</style>
</head>
<body>
<div id="topbar">
  <button class="topbtn" id="btn-menu" aria-label="Menú">
    <svg class="icon-svg" viewBox="0 0 24 24">
      <circle cx="12" cy="5" r="2.4" fill="currentColor" stroke="none"></circle>

    </svg>
  </button>
  <img id="topbar-logo" src="logo_mappiter_verd_sensefons.png" alt="Mappiter">
  <div id="topbar-list">
  <button class="topbtn" id="list-icon">
    <svg class="icon-svg" viewBox="0 0 24 24">
      <circle cx="5" cy="4.5" r="2.4" fill="currentColor" stroke="none"></circle>
      <circle cx="5" cy="12" r="2.4" fill="currentColor" stroke="none"></circle>
      <circle cx="5" cy="19.5" r="2.4" fill="currentColor" stroke="none"></circle>
      <line x1="9" y1="4.5" x2="19.5" y2="4.5"></line>

    </div>
    <div id="confirm-step-2" style="display:none">
      <button class="danger" id="confirm-final-delete">Eliminar</button>

    </div>

</div>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
function bounds(fc){let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;function scan(c){if(typeof c[0]==="number"){minX=Math.min(minX,c[0]);minY=Math.min(minY,c[1]);maxX=Math.max(maxX,c[0]);maxY=Math.max(maxY,c[1]);}else{c.forEach(scan)}}fc.features.forEach(f=>scan(f.geometry.coordinates));return [[minX,minY],[maxX,maxY]]}
function expandBounds(b,f){const minX=b[0][0],minY=b[0][1],maxX=b[1][0],maxY=b[1][1];const dx=(maxX-minX)*f,dy=(maxY-minY)*f;return [[minX-dx,minY-dy],[maxX+dx,maxY+dy]]}
function clamp(n,min,max){return Math.min(max,Math.max(min,n))}
function demoState(i,total){const multiple=Math.floor(total*0.10), lived=Math.floor(total*0.25), marked=Math.floor(total*0.50);if(i<multiple)return"lived_multiple";if(i<lived)return"lived";if(i<marked)return"marked";return"default"}
function featureBounds(geometry){let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;function scan(c){if(typeof c[0]==="number"){minX=Math.min(minX,c[0]);minY=Math.min(minY,c[1]);maxX=Math.max(maxX,c[0]);maxY=Math.max(maxY,c[1]);}else{c.forEach(scan)}}scan(geometry.coordinates);return [[minX,minY],[maxX,maxY]]}
function featureCenter(geometry){const b=featureBounds(geometry);return [(b[0][0]+b[1][0])/2,(b[0][1]+b[1][1])/2]}
function projectGeomBounds(map, geometry){let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;function scan(c){if(typeof c[0]==="number"){const p=map.project([c[0],c[1]]);minX=Math.min(minX,p.x);minY=Math.min(minY,p.y);maxX=Math.max(maxX,p.x);maxY=Math.max(maxY,p.y);}else{c.forEach(scan)}}scan(geometry.coordinates);return {minX,minY,maxX,maxY,width:maxX-minX,height:maxY-minY}}
function summaryCounts(feature){const p=feature.properties||{};const viv=Number(p.demo_viv??p.viv??p.vivencies??0)||0;const fita=Number(p.demo_fita??p.fita??p.fites??0)||0;const ruta=Number(p.demo_ruta??p.ruta??p.rutes??0)||0;return {viv,fita,ruta}}
function summaryText(feature){const c=summaryCounts(feature);const parts=[];if(c.viv>0)parts.push(c.viv+" "+(c.viv===1?"vivència":"vivències"));if(c.fita>0)parts.push(c.fita+" "+(c.fita===1?"fita":"fites"));if(c.ruta>0)parts.push(c.ruta+" "+(c.ruta===1?"ruta":"rutes"));return parts.join(" · ")}
function isMarked(feature){return (feature.properties&&feature.properties.mappiter_state)==="marked"}

function listCountsText(feature){const c=summaryCounts(feature);return c.viv+"v "+c.fita+"f "+c.ruta+"r"}
document.addEventListener("DOMContentLoaded",init);
async function init(){
const status=document.getElementById("status");
const listScreen=document.getElementById("municipis-list-screen");
const listContainer=document.getElementById("municipis-list");
const listEmpty=document.getElementById("municipis-empty");
const listSearch=document.getElementById("municipis-search");
const listFilterButtons=Array.from(document.querySelectorAll("#municipis-filters .filter-pill"));
const municipis=await fetch("municipis_icgc_simplificat.json").then(r=>r.json());
const total=municipis.features.length;
municipis.features=municipis.features.map((f,i)=>{
  if(!f.properties)f.properties={};
  f.properties.demo_state=demoState(i,total);
  if(f.properties&&f.properties.CODIMUNI!=null)f.id=f.properties.CODIMUNI;
  if(!f.id)f.id=i+1;

  const s=f.properties.demo_state;
  const n=i+1;

  if(s==="default"){
    f.properties.mappiter_state="unmarked";
    f.properties.demo_viv=0;
    f.properties.demo_fita=(n%11===0)?1:0;   // unmarked amb fites
    f.properties.demo_ruta=0;
  }else if(s==="marked"){
    f.properties.mappiter_state="marked";
    f.properties.demo_viv=0;                  // marcat sense vivències
    f.properties.demo_fita=(n%4===0)?1:0;
    f.properties.demo_ruta=(n%13===0)?1:0;
  }else if(s==="lived"){
    f.properties.mappiter_state="marked";
    f.properties.demo_viv=1;                  // una vivència
    f.properties.demo_fita=(n%4===0)?1:0;
    f.properties.demo_ruta=(n%9===0)?1:0;
  }else{
    f.properties.mappiter_state="marked";
    f.properties.demo_viv=2;                  // múltiples vivències
    f.properties.demo_fita=(n%4===0)?1:0;
    f.properties.demo_ruta=(n%7===0)?1:0;
  }
  return f;
});
const featureMap=new Map(municipis.features.map(f=>[String(f.id),f]));
const municipiListItems=municipis.features.map(f=>({id:String(f.id), searchText:((f.properties&&((f.properties.NOMMUNI||"")+" "+(f.properties.NOMCOMAR||"")+" "+(f.properties.NOMPROV||"")))||"").toLocaleLowerCase("ca")}));
const catBounds=bounds(municipis), expandedBounds=expandBounds(catBounds,0.0015);
const map=new maplibregl.Map({container:"map",style:{version:8,sources:{},layers:[]},attributionControl:false,renderWorldCopies:false,dragRotate:false,pitchWithRotate:false,touchPitch:false});
map.dragRotate.disable();map.touchZoomRotate.disableRotation();
const card=document.getElementById("municipi-card"), extra=document.getElementById("card-extra"), toast=document.getElementById("toast"), confirmOverlay=document.getElementById("confirm-overlay");
let initialCamera=null,suppress=false,selectedFeature=null,cardOpen=false,dragStartPoint=null,focusCenter=null,focusRecentering=false,ignoreUntil=0,cardAnchorTop=0,pendingUnmarkMode=null;
let activeListFilter="all";
function isListOpen(){return listScreen.classList.contains("open")}
function openListScreen(){
  closeCard();
  listScreen.classList.add("open");
  listScreen.setAttribute("aria-hidden","false");
  renderMunicipiList();
  exitSearchMode();
}
function closeListScreen(){
  exitSearchMode();
  listScreen.classList.remove("open");
  listScreen.setAttribute("aria-hidden","true");
}

function enterSearchMode(){listScreen.classList.add("search-mode")}
function exitSearchMode(){listScreen.classList.remove("search-mode");const cancelBtn=document.getElementById("municipis-search-cancel");if(cancelBtn)cancelBtn.blur();}
function matchesListFilter(feature){
  const c=summaryCounts(feature);
  if(activeListFilter==="marked") return isMarked(feature);
  if(activeListFilter==="unmarked") return !isMarked(feature);
  if(activeListFilter==="viv") return c.viv>0;
  if(activeListFilter==="fita") return c.fita>0;
  return true;
}
function renderMunicipiList(){
  const term=listSearch.value.trim().toLocaleLowerCase("ca");
  const html=[];
  for(const item of municipiListItems){
    if(term && item.searchText.indexOf(term)===-1) continue;
    const feature=featureMap.get(item.id);
    if(!feature || !matchesListFilter(feature)) continue;
    const p=feature.properties||{};
    html.push('<button class="municipi-list-row" data-id="'+item.id+'"><div class="municipi-list-main"><div class="municipi-list-marker">'+(isMarked(feature)?'<span class="municipi-list-marker-dot" aria-hidden="true"></span>':'')+'</div><div><div class="municipi-list-name">'+(p.NOMMUNI||"Municipi")+'</div><div class="municipi-list-meta">'+((p.NOMCOMAR||"Comarca")+' · '+(p.NOMPROV||"Província"))+'</div></div></div><div class="municipi-list-side"><div class="municipi-list-counts">'+listCountsText(feature)+'</div></div></button>');
  }
  listContainer.innerHTML=html.join("");
  listEmpty.classList.toggle("show", html.length===0);
}
function syncListIfOpen(){if(isListOpen())renderMunicipiList()}
function goToMunicipiFromList(id){
  const feature=featureMap.get(String(id));
  if(!feature)return;
  closeListScreen();
  selectFeature(feature);
}
function refreshMap(){const src=map.getSource("municipis");if(src)src.setData(municipis);const sel=map.getSource("selected-municipi");if(sel&&selectedFeature)sel.setData({type:"FeatureCollection",features:[selectedFeature]});syncListIfOpen()}
function showToast(text){toast.textContent=text;toast.classList.add("show");clearTimeout(showToast._t);showToast._t=setTimeout(()=>toast.classList.remove("show"),1500)}
function closeCard(){card.classList.remove("open");extra.classList.remove("open");cardOpen=false;selectedFeature=null;focusCenter=null;const src=map.getSource("selected-municipi");if(src)src.setData({type:"FeatureCollection",features:[]});ignoreUntil=Date.now()+250}
function closeConfirm(){
  confirmOverlay.classList.remove("open");
  pendingUnmarkMode=null;
  document.getElementById("confirm-title").textContent="Desmarcar municipi";
  document.getElementById("confirm-text").textContent="Aquest municipi té contingut. Què vols fer?";
  document.getElementById("confirm-step-1").style.display="";
  document.getElementById("confirm-step-2").style.display="none";
}
function centerMap(){if(!initialCamera)return;suppress=true;closeCard();map.jumpTo(initialCamera);setTimeout(()=>suppress=false,0)}
function computeCardTop(){if(!selectedFeature)return 0;const box=projectGeomBounds(map, selectedFeature.geometry);const rect=card.getBoundingClientRect();const margin=16;let top=box.maxY+104;if(top+rect.height>window.innerHeight-18){top=Math.max(margin,box.minY-rect.height-104)}return top}
function placeCard(lockTop){if(!selectedFeature)return;const center=map.project(featureCenter(selectedFeature.geometry));const rect=card.getBoundingClientRect();const margin=16;let left=center.x, half=rect.width/2;if(left-half<margin)left=margin+half;if(left+half>window.innerWidth-margin)left=window.innerWidth-margin-half;card.style.left=left+"px";if(lockTop){card.style.top=cardAnchorTop+"px"}else{cardAnchorTop=computeCardTop();card.style.top=cardAnchorTop+"px"}}
function targetZoomForFeature(){const minZoom=8.15,maxZoom=8.45,current=map.getZoom();if(current<minZoom)return 8.25;if(current>maxZoom)return current;return current}
function updateCardActions(){
 if(!selectedFeature)return;
 const primary=document.getElementById("btn-primary");
 const marked=isMarked(selectedFeature);
 primary.textContent=marked?"Afegir vivència":"Marcar municipi";
 const actions=marked?[
  {id:"extra-fita",label:"Afegir fita",full:true},
  {id:"extra-view",label:"Veure municipi"},
  {id:"extra-unmark",label:"Desmarcar municipi"}
 ]:[
  {id:"extra-viv",label:"Afegir vivència",full:true},
  {id:"extra-fita",label:"Afegir fita"},
  {id:"extra-view",label:"Veure municipi"}
 ];
 extra.innerHTML=actions.map(a=>'<button id="'+a.id+'"'+(a.full?' class="full"':'')+'>'+a.label+'</button>').join("");
 bindExtraButtons();
}
function updateCardContent(feature){const p=feature.properties||{};const summaryEl=document.getElementById("card-summary");const summary=summaryText(feature);document.getElementById("card-title").textContent=p.NOMMUNI||"Municipi";document.getElementById("card-meta").textContent=(p.NOMCOMAR||"Comarca")+" · "+(p.NOMPROV||"Província");summaryEl.textContent=summary;summaryEl.hidden=!summary;updateCardActions()}
function selectFeature(feature){selectedFeature=feature;focusCenter=featureCenter(feature.geometry);updateCardContent(feature);extra.classList.remove("open");const src=map.getSource("selected-municipi");if(src)src.setData({type:"FeatureCollection",features:[feature]});map.easeTo({center:focusCenter,zoom:targetZoomForFeature(),offset:[0,-145],duration:220,essential:true});setTimeout(function(){card.classList.add("open");cardOpen=true;placeCard(false)},230)}
function markMunicipi(f){f.properties.mappiter_state="marked";f.properties.demo_state="marked";refreshMap();updateCardContent(f);showToast("Municipi marcat")}
function addVivencia(f){f.properties.mappiter_state="marked";f.properties.demo_state="lived";f.properties.demo_viv=Number(f.properties.demo_viv||0)+1;refreshMap();updateCardContent(f);showToast("Vivència afegida")}
function addFita(f){f.properties.demo_fita=Number(f.properties.demo_fita||0)+1;if(f.properties.mappiter_state==="marked" && Number(f.properties.demo_viv||0)===0){f.properties.demo_state="marked";}refreshMap();updateCardContent(f);showToast("Fita afegida")}
function directUnmark(f){f.properties.mappiter_state="unmarked";f.properties.demo_state="default";f.properties.demo_viv=0;f.properties.demo_fita=0;f.properties.demo_ruta=0;refreshMap();updateCardContent(f);showToast("Municipi desmarcat")}
function unmarkKeepFites(f){f.properties.mappiter_state="unmarked";f.properties.demo_state="default";f.properties.demo_viv=0;f.properties.demo_ruta=0;refreshMap();updateCardContent(f);showToast("Municipi desmarcat mantenint fites")}
function openDecisionDialog(feature){
  const c=summaryCounts(feature);
  document.getElementById("confirm-title").textContent="Desmarcar municipi";
  document.getElementById("confirm-text").textContent="Aquest municipi té contingut. Què vols fer?";
  document.getElementById("confirm-step-1").style.display="";
  document.getElementById("confirm-step-2").style.display="none";
  document.getElementById("confirm-keep-fites").style.display = c.fita>0 ? "" : "none";
  confirmOverlay.classList.add("open");
}
function openFinalConfirm(mode){
  pendingUnmarkMode=mode;
  document.getElementById("confirm-title").textContent="Desmarcar municipi";
  document.getElementById("confirm-text").textContent = mode==="keep_fites"
    ? "Aquesta acció eliminarà definitivament tot el contingut que has registrat en aquest municipi, exceptuant les fites"
    : "Aquesta acció eliminarà definitivament tot el contingut que has registrat en aquest municipi";
  document.getElementById("confirm-step-1").style.display="none";
  document.getElementById("confirm-step-2").style.display="";
  confirmOverlay.classList.add("open");
}
function handleUnmark(f){
  const c=summaryCounts(f);
  if(c.viv===0&&c.fita===0&&c.ruta===0){directUnmark(f);return;}
  openDecisionDialog(f);
}
function bindExtraButtons(){
 const g=id=>document.getElementById(id);
 if(g("extra-view")) g("extra-view").onclick=function(ev){ev.stopPropagation();showToast("Veure municipi")};
 if(g("extra-viv")) g("extra-viv").onclick=function(ev){ev.stopPropagation();addVivencia(selectedFeature)};
 if(g("extra-fita")) g("extra-fita").onclick=function(ev){ev.stopPropagation();addFita(selectedFeature)};
 if(g("extra-unmark")) g("extra-unmark").onclick=function(ev){ev.stopPropagation();handleUnmark(selectedFeature)};
}
map.on("load",function(){
 map.addSource("municipis",{type:"geojson",data:municipis,promoteId:"id"});
 map.addSource("selected-municipi",{type:"geojson",data:{type:"FeatureCollection",features:[]}});
 map.addLayer({id:"municipis-fill",type:"fill",source:"municipis",paint:{"fill-color":["case",["==",["get","mappiter_state"],"unmarked"],"#F3F1EC",["==",["get","demo_viv"],0],"#2EC4CE",["==",["get","demo_viv"],1],"#0B4F8A","#062E57"]}});
 map.addLayer({id:"municipis-dim",type:"fill",source:"municipis",paint:{"fill-color":"#08262B","fill-opacity":["case",["==",["get","mappiter_state"],"unmarked"],0,0.18]}});
 map.addLayer({id:"selected-fill",type:"fill",source:"selected-municipi",paint:{"fill-color":["case",["==",["get","mappiter_state"],"unmarked"],"#E3D9CB",["==",["get","demo_viv"],0],"#5DD6DA",["==",["get","demo_viv"],1],"#2E689D","#163E63"],"fill-opacity":0.88}});
 map.addLayer({id:"municipis-line",type:"line",source:"municipis",paint:{"line-color":["case",["==",["get","mappiter_state"],"unmarked"],"#CFCBC3",["==",["get","demo_viv"],0],"#D8EEF2",["==",["get","demo_viv"],1],"#CFE6FF","#E6F1FF"],"line-width":["interpolate",["linear"],["zoom"],6,0.8,8,1.0,10,1.3]}});
 map.addLayer({id:"selected-line",type:"line",source:"selected-municipi",paint:{"line-color":"#D45C63","line-width":["interpolate",["linear"],["zoom"],6,1.8,8,2.2,10,2.6]}});
 map.resize();initialCamera=map.cameraForBounds(catBounds,{padding:{top:28,right:18,bottom:64,left:18}});initialCamera.bearing=0;initialCamera.pitch=0;map.jumpTo(initialCamera);map.setMinZoom(6.1);map.setMaxZoom(10.5);status.style.display="none";
});
map.on("click","municipis-fill",function(e){if(Date.now()<ignoreUntil||isListOpen())return;const feature=e.features&&e.features[0];if(!feature)return;const real=featureMap.get(String(feature.id))||feature;if(cardOpen){closeCard();return}selectFeature(real)});
map.on("mouseenter","municipis-fill",function(){map.getCanvas().style.cursor="pointer"});
map.on("mouseleave","municipis-fill",function(){map.getCanvas().style.cursor=""});
map.on("click",function(e){if(Date.now()<ignoreUntil||isListOpen())return;const feats=map.queryRenderedFeatures(e.point,{layers:["municipis-fill"]});if(cardOpen){if(!card.contains(e.originalEvent.target)){closeCard()}}else if(!feats.length){closeCard()}});
map.on("dragstart",function(e){if(cardOpen)dragStartPoint=e.point});
map.on("move",function(){if(cardOpen&&focusCenter&&!focusRecentering){const current=map.getCenter();const dx=current.lng-focusCenter[0],dy=current.lat-focusCenter[1],maxOffset=0.06;if(Math.abs(dx)>maxOffset||Math.abs(dy)>maxOffset){focusRecentering=true;map.easeTo({center:focusCenter,offset:[0,-145],duration:120,essential:true});setTimeout(function(){focusRecentering=false},140)}}});
map.on("dragend",function(e){if(!cardOpen||!dragStartPoint)return;const dx=e.point.x-dragStartPoint.x,dy=e.point.y-dragStartPoint.y;const dist=Math.sqrt(dx*dx+dy*dy);dragStartPoint=null;if(dist>48){closeCard()}});
map.on("moveend",function(){if(suppress||!initialCamera)return;const c=map.getCenter();const minLng=expandedBounds[0][0],minLat=expandedBounds[0][1],maxLng=expandedBounds[1][0],maxLat=expandedBounds[1][1];const lng=clamp(c.lng,minLng,maxLng),lat=clamp(c.lat,minLat,maxLat);if(lng!==c.lng||lat!==c.lat){suppress=true;map.easeTo({center:[lng,lat],zoom:map.getZoom(),duration:200,essential:true});setTimeout(function(){suppress=false},220)}});
document.getElementById("center").addEventListener("click",centerMap);
document.getElementById("btn-close").addEventListener("click",function(ev){ev.stopPropagation();closeCard()});
document.getElementById("btn-primary").addEventListener("click",function(ev){ev.stopPropagation();if(!selectedFeature)return;if(isMarked(selectedFeature)){addVivencia(selectedFeature)}else{markMunicipi(selectedFeature)}});
document.getElementById("btn-more").addEventListener("click",function(ev){ev.stopPropagation();extra.classList.toggle("open");setTimeout(function(){placeCard(true)},10)});
document.getElementById("confirm-delete-all").addEventListener("click",function(){
  if(!selectedFeature)return;
  openFinalConfirm("delete_all");
});
document.getElementById("confirm-keep-fites").addEventListener("click",function(){
  if(!selectedFeature)return;
  openFinalConfirm("keep_fites");
});
document.getElementById("confirm-cancel").addEventListener("click",closeConfirm);
document.getElementById("confirm-final-delete").addEventListener("click",function(){
  if(!selectedFeature || !pendingUnmarkMode)return;
  if(pendingUnmarkMode==="keep_fites") unmarkKeepFites(selectedFeature);
  else directUnmark(selectedFeature);
  closeConfirm();
});
document.getElementById("confirm-final-cancel").addEventListener("click",closeConfirm);
confirmOverlay.addEventListener("click",function(ev){if(ev.target===confirmOverlay)closeConfirm()});
document.getElementById("list-icon").addEventListener("click",function(ev){ev.stopPropagation();openListScreen()});
document.getElementById("municipis-list-back").addEventListener("click",function(ev){ev.stopPropagation();closeListScreen()});
document.getElementById("municipis-search-cancel").addEventListener("click",function(ev){ev.stopPropagation();listSearch.blur();exitSearchMode()});
listSearch.addEventListener("focus",enterSearchMode);
listSearch.addEventListener("input",renderMunicipiList);
listFilterButtons.forEach(function(btn){
  btn.addEventListener("click",function(){
    activeListFilter=btn.getAttribute("data-filter")||"all";
    listFilterButtons.forEach(function(other){other.classList.toggle("active",other===btn)});
    renderMunicipiList();
  });
});
listContainer.addEventListener("click",function(ev){
  const row=ev.target.closest(".municipi-list-row");
  if(!row)return;
  goToMunicipiFromList(row.getAttribute("data-id"));
});
card.addEventListener("click",function(ev){ev.stopPropagation()});
}
</script>
</body>
