<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Mappiter debug layout header</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
<style>
:root{ --header-h: 60px; }
html,body{
  margin:0;
  height:100%;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:#fff;
}
body{
  display:flex;
  flex-direction:column;
  min-height:100dvh;
  overflow:hidden;
}
#topBand{
  height:var(--header-h);
  min-height:var(--header-h);
  max-height:var(--header-h);
  flex:0 0 var(--header-h);
  background:#fff;
  border-bottom:1px solid rgba(0,0,0,.08);
  box-shadow:0 2px 6px rgba(0,0,0,.08);
  position:relative;
  z-index:10;
}
#mapWrap{
  position:relative;
  flex:1 1 auto;
  min-height:0;
}
#map{
  position:absolute;
  inset:0;
}
#loading{
  position:fixed;
  left:12px;
  top:72px;
  z-index:30;
  background:rgba(255,255,255,.96);
  border:1px solid rgba(0,0,0,.12);
  border-radius:12px;
  padding:8px 10px;
  font-weight:700;
}
#debug{
  position:fixed;
  left:10px;
  right:10px;
  bottom:10px;
  max-height:42vh;
  overflow:auto;
  z-index:30;
  background:rgba(255,255,255,.97);
  border:1px solid rgba(0,0,0,.12);
  border-radius:14px;
  padding:10px 12px;
  font:12px/1.35 ui-monospace,SFMono-Regular,Menlo,monospace;
  white-space:pre-wrap;
  box-shadow:0 8px 20px rgba(0,0,0,.14);
}
</style>
</head>
<body>
<div id="topBand"></div>
<div id="mapWrap"><div id="map"></div></div>
<div id="loading">Diagnòstic header/layout…</div>
<div id="debug"></div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
window.addEventListener("load", async function(){
  const debugEl = document.getElementById('debug');
  const loadingEl = document.getElementById('loading');
  const header = document.getElementById('topBand');
  const mapWrap = document.getElementById('mapWrap');
  const t0 = performance.now();

  function log(msg){
    debugEl.textContent += msg + "\\n";
    console.log(msg);
  }
  function fmtMs(ms){
    return (Math.round(ms * 10) / 10) + " ms";
  }
  function bounds(fc){
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    function scan(c){
      if(typeof c[0]==="number"){
        minX=Math.min(minX,c[0]); minY=Math.min(minY,c[1]);
        maxX=Math.max(maxX,c[0]); maxY=Math.max(maxY,c[1]);
      }else c.forEach(scan);
    }
    fc.features.forEach(f=>scan(f.geometry.coordinates));
    return [[minX,minY],[maxX,maxY]];
  }

  log("=== DIAGNÒSTIC HEADER / FIT INITIAL ===");
  log("window.onload disparat");
  log("window.innerWidth = " + window.innerWidth);
  log("window.innerHeight = " + window.innerHeight);
  log("header height CSS fixa = 60");

  const a = performance.now();
  const municipis = await fetch("municipis_icgc_simplificat.json",{cache:"default"}).then(r=>r.json());
  const b = performance.now();
  const outlineBounds = bounds(municipis);
  log("fetch+parse municipis_icgc_simplificat.json = " + fmtMs(b - a));

  const map = new maplibregl.Map({
    container:"map",
    style:{version:8,sources:{},layers:[]},
    attributionControl:false,
    renderWorldCopies:false,
    dragRotate:false,
    pitchWithRotate:false,
    touchPitch:false,
    doubleClickZoom:false
  });
  log("map creat");

  municipis.features = municipis.features.map(f => {
    if (f.properties && f.properties.CODIMUNI != null) f.id = f.properties.CODIMUNI;
    return f;
  });

  map.on("load", () => {
    log("EVENT load");
    map.addSource("municipis", { type:"geojson", data:municipis, promoteId:"CODIMUNI" });
    log("addSource municipis");

    map.addLayer({
      id:"municipis-fill",
      type:"fill",
      source:"municipis",
      paint:{ "fill-color":"#f4f4f2" }
    });
    log("addLayer municipis-fill");

    map.addLayer({
      id:"municipis-line",
      type:"line",
      source:"municipis",
      paint:{
        "line-color":"#B8B8B8",
        "line-width":[
          "interpolate",["linear"],["zoom"],
          6,0.5,
          8,0.8,
          10,1.2
        ]
      }
    });
    log("addLayer municipis-line");

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        const headerRect = header.getBoundingClientRect();
        const wrapRect = mapWrap.getBoundingClientRect();
        log("abans fitBounds:");
        log("- header final = " + Math.round(headerRect.width) + " x " + Math.round(headerRect.height));
        log("- contenidor mapa = " + Math.round(wrapRect.width) + " x " + Math.round(wrapRect.height));
        log("- zoom abans fitBounds = " + map.getZoom());

        map.resize();
        log("map.resize() manual");

        map.fitBounds(outlineBounds, { padding: 60, animate:false });
        log("fitBounds inicial");
        log("- zoom immediat després fitBounds = " + map.getZoom().toFixed(3));

        map.once("idle", () => {
          const z = map.getZoom();
          map.setMinZoom(z);
          map.setMaxZoom(z + 5);
          map.setMaxBounds(outlineBounds);
          log("idle inicial, minZoom fixat = " + z.toFixed(3));
          loadingEl.textContent = "Diagnòstic complet";
        });

        setTimeout(() => {
          const z1 = map.getZoom();
          const c1 = map.getCenter();
          log("- zoom 1 segon després = " + z1.toFixed(3));
          log("- center 1 segon després = " + c1.lng.toFixed(5) + ", " + c1.lat.toFixed(5));
        }, 1000);
      });
    });
  });

  map.on("resize", () => log("EVENT map.resize"));
  window.addEventListener("resize", () => {
    const headerRect = header.getBoundingClientRect();
    const wrapRect = mapWrap.getBoundingClientRect();
    log("EVENT window.resize -> header " + Math.round(headerRect.height) + " | mapa " + Math.round(wrapRect.width) + " x " + Math.round(wrapRect.height));
  });
});
</script>
</body>
</html>
